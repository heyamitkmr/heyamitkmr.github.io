ing effective altruism", "d": "* In this role, you'll lead a One for the World chapter at your MBA program to fight extreme poverty through effective giving.\n* Build and lead a student volunteer team organizing events and outreach to promote The 1% Pledge.\n* Dedicate 2-3 hours weekly to chapter activities, including regular calls with staff and semi-annual conferences.\n* Educate peers about effective giving principles and GiveWell charities' impact.\n* Raise funds for cost-effective charities by motivating fellow students to pledge 1% of their income.", "ex": "Entry-level", "rt": "Outreach, Operations", "po": "Volunteering", "sa": "Not Found", "lg": "https://80000hours.org/wp-content/uploads/2023/03/One-for-the-World.jpeg", "oj": "https://www.1fortheworld.org/jobs-at-oftw", "hi": false, "dp": "2025-07-30"}, {"id": 749, "t": "Junior Security Software Engineer", "o": "Openchip", "lk": "https://openchip.factorialhr.com/job_posting/junior-security-software-engineer-243261", "lo": "Barcelona, Spain", "cl": "Rolling", "ar": "D. Career development: Technical", "d": "* In this role, you'll design and implement security features across Openchip's software stack for RISC-V chips with security at heart.\n* Develop secure boot, confidential computing, cryptography, and platform security features.\n* Define and modify interfaces to expose security features to user applications.\n* Collaborate with firmware, operating systems, and middleware teams to integrate security features.\n* Contribute to shared team responsibilities including code reviews, bug triaging, and documentation.", "ex": "Junior (1-4 years experience)", "rt": "Software engineering, Information security", "po": "Full-time", "sa": "Not Found", "lg": "https://80000hours.org/wp-content/uploads/2025/05/openchip_logo.jpg", "oj": "https://openchip.factorialhr.com/#jobs", "hi": false, "dp": "2025-05-20"}, {"id": 750, "t": "Federal Internship Finder", "o": "Partnership for Public Service", "lk": "https://gogovernment.org/federal-internship-finder/", "lo": "Washington · DC metro area, USA", "cl": "Rolling", "ar": "6. Career development: Policy & government", "d": "\"The federal government offers many job opportunities, but they can be difficult to find, track and navigate, complicated by short application windows and information scattered across hundreds of different webpages. The GoGovernment Federal Internship Finder, created by the Partnership for Public Service, will simplify your search for federal opportunities. The tool compiles publicly accessible information about professional and academic opportunities in government for students and recent graduates into one centralized place.\"", "ex": "Entry-level", "rt": "Policy, Research, Operations", "po": "Internship", "sa": "Not Found", "lg": "https://80000hours.org/wp-content/uploads/2021/03/partnership-for-public-service.jpeg", "oj": "https://ourpublicservice.org/careers/#openings", "hi": false, "dp": "2024-01-08"}, {"id": 751, "t": "Used Lead Acid Battery Advisor", "o": "Pure Earth", "lk": "https://app.trinethire.com/companies/586876-pure-earth/jobs/116616-used-lead-acid-battery-ulab-advisor", "lo": "New York · NY, USA", "cl": "Rolling", "ar": "A. Global health & development", "d": "* In this role, you'll serve as Pure Earth's focal person for the lead acid battery industry, developing evidence-based policy recommendations for ULAB recycling in low-income countries.\n* Research global LAB supply chain dynamics and complete mass balance studies for targeted geographies.\n* Evaluate ULAB recycling facilities for environmental safeguards and regulatory compliance.\n* Develop policy briefs and implementation playbooks for ULAB recycling based on latest research findings.", "ex": "Junior (1-4 years experience),Mid (5-9 years experience)", "rt": "Research, Policy", "po": "Full-time", "sa": "Not Found", "lg": "https://80000hours.org/wp-content/uploads/2022/12/Pure-Earth.jpeg", "oj": "https://www.pureearth.org/about-us/jobs/", "hi": false, "dp": "2026-02-02"}, {"id": 752, "t": "Executive and Operations Assistant, CEO Office", "o": "Rethink Wellbeing", "lk": "https://forms.gle/3sxtZiSLU4gQZryR7", "lo": "Remote, India · Remote, Philippines", "cl": "Rolling", "ar": "A. Global health & development", "d": "* In this role, you'll serve as a force multiplier for the CEO and leadership team, ensuring smooth operations across multiple domains at a global mental health nonprofit.\n* Act as the first point of contact for all stakeholders, handling communications and coordinating meetings.\n* Coordinate cross-functional projects, ensuring deadlines are met while drafting documents on behalf of the CEO.\n* Handle sensitive administrative tasks including invoices, contracts, legal documents, payments, and refunds.\n* Utilize automation and AI tools to streamline processes while maintaining confidentiality.", "ex": "Junior (1-4 years experience)", "rt": "Operations", "po": "Part-time,Full-time", "sa": "$425 - $1,100 per month", "lg": "https://80000hours.org/wp-content/uploads/2023/02/Rethink-Wellbeing.png", "oj": "", "hi": false, "dp": "2026-02-18"}, {"id": 753, "t": "Junior Program Manager / Senior Program Manager", "o": "Rethink Wellbeing", "lk": "https://docs.google.com/forms/d/e/1FAIpQLSeJmBjaIbBDT2AaFpTYSfCoDNlafY2BgQpKubqLgfMyeOPG1A/viewform", "lo": "Remote, Global", "cl": "Rolling", "ar": "A. Global health & development", "d": "* In this role, you'll deliver and improve the CBT Lab, a digital mental health program, while managing and training facilitators.\n* Recruit, train, and supervise volunteer facilitators delivering evidence-based CBT group sessions.\n* Manage program coordination from enrollment through graduation, including support for complex cases.\n* Oversee AI-enhanced therapeutic support tools in collaboration with clinical staff.\n* Monitor program metrics and participant feedback to identify improvements and maintain clinical integrity.", "ex": "Junior (1-4 years experience),Mid (5-9 years experience)", "rt": "Operations, Management", "po": "Full-time", "sa": "$15,000 - $20,000", "lg": "https://80000hours.org/wp-content/uploads/2023/02/Rethink-Wellbeing.png", "oj": "", "hi": false, "dp": "2026-03-11"}, {"id": 754, "t": "Residency Program", "o": "SandboxAQ", "lk": "https://www.sandboxaq.com/company/residencies", "lo": "Remote, USA · Remote, Canada", "cl": "Rolling", "ar": "D. Career development: Technical", "d": "- In this residency, you can build technical skills for career capital.\n- Improve the security of global data infrastructure against Store Now Decrypt Later attacks and migrate from RSA and ECC to quantum-resistant cryptosystems.\n- Build and scale the next generation of quantum sensors using AI tools to impact sectors such as life sciences, navigation, and geophysics.\n- Combine physics-based and AI algorithms with accelerated hardware to develop hybrid quantum/classical applications for drug discovery and materials science.", "ex": "Entry-level", "rt": "Software engineering, Research", "po": "Full-time", "sa": "Not Found", "lg": "https://80000hours.org/wp-content/uploads/2023/06/SandboxAQ.jpeg", "oj": "https://www.sandboxaq.com/careers", "hi": false, "dp": "2024-06-27"}, {"id": 755, "t": "Volunteer, General Application", "o": "Shrimp Welfare Project", "lk": "https://docs.google.com/forms/d/e/1FAIpQLSf1fzJ-a8vsyZcQI46OCTH1l0eMYjM-k2fBndWaySrDq9Defg/viewform", "lo": "Remote, Global", "cl": "Rolling", "ar": "B. Animal welfare", "d": "\"If you think you'd be a good fit for Shrimp Welfare Project, but we don't have a specific role advertised at the moment, please feel free to fill out this form, letting us know more about yourself and how you think you can help us help shrimps! \nWe're primarily looking for volunteer applicants, though this may evolve into a more permanent paid role in the future. [...]\"", "ex": "Entry-level", "rt": "Research, Outreach, Policy", "po": "Volunteering", "sa": "Unpaid", "lg": "https://80000hours.org/wp-content/uploads/2023/01/Shrimp-Welfare-Project.png", "oj": "https://www.shrimpwelfareproject.org/work-with-us", "hi": false, "dp": "2022-07-21"}, {"id": 756, "t": "Internship Program", "o": "Singapore Institute of International Affairs", "lk": "https://www.siiaonline.org/work-at-siia/", "lo": "Singapore, Singapore", "cl": "Rolling", "ar": "6. Career development: Policy & government", "d": "- The SIIA internship program is an opportunity for tertiary students from diverse backgrounds to explore and develop a career in international relations, and gives them the chance to learn new skills. \n- Work alongside experts on international relations projects. \n- Assist in organising and managing events and workshops. \n- Contribute to research and analysis on global affairs. \n- Support marketing and outreach initiatives.", "ex": "Entry-level", "rt": "Policy", "po": "Internship", "sa": "Not Found", "lg": "https://80000hours.org/wp-content/uploads/2024/10/singapore_institute_of_international_affairs_logo.jpeg", "oj": "https://www.siiaonline.org/work-at-siia/", "hi": false, "dp": "2024-10-31"}, {"id": 757, "t": "Editorial Assistant", "o": "Slow Boring", "lk": "https://open.substack.com/pub/matthewyglesias/p/come-work-with-us?r=2dxy0&utm_campaign=post&utm_medium=email", "lo": "Washington · DC metro area, USA", "cl": "Rolling", "ar": "6. Career development: Policy & government", "d": "* In this role, you'll provide editorial and administrative support for the Slow Boring newsletter in Washington, DC.\n* Copy edit and schedule newsletters while moderating community comment sections.\n* Create charts and graphics to accompany articles and research potential newsletter topics.\n* Draft and schedule podcast show notes and episode releases.", "ex": "Entry-level", "rt": "Other, Policy", "po": "Full-time", "sa": "$55,000", "lg": "https://80000hours.org/wp-content/uploads/2025/04/slow_boring_logo.webp", "oj": "", "hi": false, "dp": "2025-04-11"}, {"id": 758, "t": "Traineeships", "o": "SolarPower Europe", "lk": "https://www.solarpowereurope.org/about/careers/traineeship", "lo": "Brussels, Belgium · Europe", "cl": "Rolling", "ar": "6. Career development: Policy & government", "d": "\"As a trainee you will gain first-hand insight into SolarPower Europe’s activities and contribute to the associations work to make solar the leading contributor to Europe’s energy system. The tasks performed by you as a trainee are supervised and differ according to the unit you join. We have regular traineeship openings in policy, business development, market intelligence, events and communications.\"", "ex": "Entry-level", "rt": "Policy, Outreach", "po": "Internship", "sa": "Not Found", "lg": "https://80000hours.org/wp-content/uploads/2023/11/solarpower_europe_logo.jpeg", "oj": "https://www.solarpowereurope.org/about/careers", "hi": false, "dp": "2023-11-03"}, {"id": 759, "t": "Volunteer", "o": "Taimaka", "lk": "https://taimaka.org/work-with-us", "lo": "Global", "cl": "Rolling", "ar": "A. Global health & development", "d": "- As a volunteer, you'll pursue the most cost-effective development solutions and raise money to scale them.\n- Potential projects include data analysis, fundraiser running, public health research, coding, and communications.", "ex": "Entry-level", "rt": "Research, Software engineering, Outreach", "po": "Volunteering", "sa": "Not Found", "lg": "https://80000hours.org/wp-content/uploads/2024/07/taimaka_logo.jpeg", "oj": "https://taimaka.org/work-with-us", "hi": false, "dp": "2024-10-01"}, {"id": 760, "t": "Field Research Fellowship", "o": "Taimaka", "lk": "https://docs.google.com/forms/d/e/1FAIpQLSdSZx0TZ1_wFfks9XC_nz0wuQ4h_QqY6K1OP7aZ1tPw299Guw/viewform", "lo": "Gombe, Nigeria", "cl": "Rolling", "ar": "A. Global health & development", "d": "- In this role, a research fellow will assist the research director as Taimaka expands its research portfolio in Nigeria. \n- Conduct research to identify ways to make malnutrition treatment more cost-effective. \n- Participate in piloting a novel complementary food for treating moderate acute malnutrition. \n- Engage in an RCT of mass azithromycin distribution in the treatment of severe acute malnutrition. \n- Contribute to a long-term observational study on the correlates of relapse.", "ex": "Junior (1-4 years experience)", "rt": "Research", "po": "Fellowship", "sa": "$500 - $1,000 per month stipend", "lg": "https://80000hours.org/wp-content/uploads/2024/07/taimaka_logo.jpeg", "oj": "https://taimaka.org/work-with-us", "hi": false, "dp": "2024-11-05"}, {"id": 761, "t": "Volunteer", "o": "Tien Procent Club", "lk": "https://www.tienprocent.club/doe-mee", "lo": "Netherlands", "cl": "Rolling", "ar": "5. Building effective altruism", "d": "* As a volunteer, you'll promote effective giving.\n* Help organize events and build a culture where effective giving becomes the norm.\n* Share stories and spread messages about effective giving through social media and personal networks.\n* Contribute to projects focused on poverty, health, climate, animal welfare, or women's empowerment.\n* Engage in a specific role as message spreader, creative contributor, event organizer, advisor, or fundraiser.", "ex": "Entry-level", "rt": "Outreach, Operations", "po": "Volunteering", "sa": "Not Found", "lg": "https://80000hours.org/wp-content/uploads/2025/06/tien_procent_club_logo.jpeg", "oj": "https://www.tienprocent.club/#:~:text=Vacatures", "hi": false, "dp": "2026-02-04"}, {"id": 762, "t": "CyberFirst University Bursary", "o": "UK Government, GCHQ", "lk": "https://www.gchq-careers.co.uk/our-careers/early-careers/student-bursary.html", "lo": "UK", "cl": "Rolling", "ar": "D. Career development: Technical", "d": "-This is a £4,000 per university year bursary.\n- Complete an eight-week summer placement to build knowledge and experience at the CyberFirst Academy.\n- Alternatively, spend eight weeks working alongside industry and government at one of over 100 industry partners.\n- Learn essential skills; coding proficiency is not a prerequisite for joining.\n- Secure job placement assistance in the cyber security field after graduation.", "ex": "Entry-level", "rt": "Information security", "po": "Full-time", "sa": "£4,000 bursary", "lg": "https://80000hours.org/wp-content/uploads/2019/06/UK-government-communication-headquarters.jpg", "oj": "https://www.gchq-careers.co.uk/jobs.html", "hi": false, "dp": "2024-06-19"}, {"id": 763, "t": "Research Assistant", "o": "University of Chicago, Development Innovation Lab", "lk": "https://dil.uchicago.edu/opportunities/research-assistant-dil/?occurrence_id=0", "lo": "Chicago · IL, USA", "cl": "Rolling", "ar": "D. Career development: Technical", "d": "- In this role, you'll work on projects in the areas of education, agriculture, health, and vaccinations supported by the Development Innovation Lab.\n- Assist researchers with literature reviews and systematic searches, drafting parts of such reviews.\n- Clean data and help with preliminary analysis essential for research tasks.\n- Write summaries of research projects and contribute to the drafting of project reports and policy memos.\n- Support day-to-day administrative tasks, including transcribing and note-taking for key meetings with partner organisations.", "ex": "Entry-level", "rt": "Research", "po": "Full-time", "sa": "Not Found", "lg": "https://80000hours.org/wp-content/uploads/2019/12/iversity-of-chicago.png", "oj": "https://bfi.uchicago.edu/development-innovation-lab-careers/", "hi": false, "dp": "2024-08-08"}, {"id": 764, "t": "Data Analyst, Air Quality Life Index", "o": "University of Chicago, Energy Policy Institute", "lk": "https://aqli.epic.uchicago.edu/news/job-opportunity-data-analyst-air-quality-life-index-aqli/", "lo": "Remote, India", "cl": "Rolling", "ar": "A. Global health & development", "d": "- In this role, you will assist with conducting underlying data analysis for reports and maintain a GitHub repository. \n- Implement the annual data pipeline process, processing raw satellite data into usable formats and applying calculations. \n- Maintain data in a ready-to-use format and update the open-access Github repository. \n- Perform analyses and generate figures for the annual report and other outreach activities. \n- Liaise with external partners, especially website developers, to advance the AQLI platform.", "ex": "Junior (1-4 years experience)", "rt": "Research", "po": "Full-time", "sa": "Not Found", "lg": "https://80000hours.org/wp-content/uploads/2019/12/iversity-of-chicago.png", "oj": "https://academicjobs.uchicago.edu/positions", "hi": false, "dp": "2025-02-17"}, {"id": 765, "t": "Volunteer Internship Program", "o": "US Government, Congressional Research Service", "lk": "https://www.loc.gov/crsinfo/opportunities/volunteer.html", "lo": "Washington · DC metro area, USA", "cl": "Rolling", "ar": "6. Career development: Policy & government", "d": "\"Congressional Research Service (CRS) volunteer internships give students and professionals an opportunity to observe and learn about the legislative process at the national level. Volunteer internships are highly competitive and offered on an as-needed basis as determined by CRS divisions and offices. Internships can last from three months to one year; hours are determined by the needs of CRS and the applicant [...]\"", "ex": "Entry-level", "rt": "Policy, Research, Operations", "po": "Internship", "sa": "Not Found", "lg": "https://80000hours.org/wp-content/uploads/2022/12/Congressional-Research-Service.jpeg", "oj": "http://www.loc.gov/crsinfo/opportunities/", "hi": false, "dp": "2022-02-25"}, {"id": 766, "t": "Intern, Business Advisory Services and Event Planning", "o": "US-China Business Council", "lk": "https://www.uschina.org/business-advisory-services-and-event-planning-intern-beijing/", "lo": "Beijing, China", "cl": "Rolling", "ar": "6. Career development: Policy & government", "d": "* In this role, you'll assist with research, analysis, and event planning at USCBC's Beijing office.\n* Research and analyze China-related business issues using Chinese-language sources to provide English updates.\n* Aid with written translations of materials between Chinese and English.\n* Provide administrative and program support for the office.\n* Collaborate with a small team in a fast-paced environment while managing multiple tasks simultaneously.", "ex": "Entry-level", "rt": "Policy, Operations", "po": "Internship", "sa": "Not Found", "lg": "https://80000hours.org/wp-content/uploads/2021/11/us-china-business-council.jpeg", "oj": "https://www.uschina.org/about/jobs", "hi": false, "dp": "2025-07-02"}, {"id": 767, "t": "Early-Career Awards", "o": "Wellcome Trust", "lk": "https://wellcome.org/grant-funding/schemes/early-career-awards", "lo": "UK", "cl": "21/7/2026", "ar": "D. Career development: Technical", "d": "- This scheme provides funding for early-career researchers from any discipline who are ready to develop their research identity.\n- Develop and lead innovative research projects to advance understanding in any discipline related to human life, health, and wellbeing.\n- Focus on developing methodologies, frameworks, or techniques that benefit health-related research.\n- Expand technical skills, build a collaborative network, and develop people management skills during the award.", "ex": "Entry-level", "rt": "Research", "po": "Funding", "sa": "Up to $400,000 award", "lg": "https://80000hours.org/wp-content/uploads/2021/05/wellcome-trust.jpeg", "oj": "https://wellcome.wd3.myworkdayjobs.com/Wellcome", "hi": false, "dp": "2024-10-28"}, {"id": 768, "t": "Research Intern", "o": "Wisconsin Project on Nuclear Arms Control", "lk": "https://www.wisconsinproject.org/about-us/employment/", "lo": "Washington · DC metro area, USA", "cl": "Rolling", "ar": "3. Nuclear security", "d": "* In this role, you'll conduct open-source research on proliferation and sanctions evasion networks.\n* Perform research on the internet and using commercial and trade databases.", "ex": "Entry-level", "rt": "Research, Policy", "po": "Internship", "sa": "Not Found", "lg": "https://80000hours.org/wp-content/uploads/2020/06/winsconsin-project-on-nuclear-arms-control.jpg", "oj": "https://www.wisconsinproject.org/about-us/employment/", "hi": false, "dp": "2025-11-19"}, {"id": 769, "t": "Pre-Doctoral Fellows Program", "o": "Yale University, Tobin Center for Economic Policy", "lk": "https://tobin.yale.edu/programs/pre-doctoral-fellows-program", "lo": "New Haven · CT, USA", "cl": "Rolling", "ar": "6. Career development: Policy & government", "d": "- The Pre-Doctoral Fellows Program at Yale University provides a training experience for individuals considering a Ph.D. in economics or a related discipline.\n- Work as full-time research assistants for faculty mentors for one to two years.\n- Take or audit one course per semester and participate in a weekly professional development seminar.\n- Attend department research seminars and work in common workspaces to encourage camaraderie and peer learning.\n- Engage with a diverse community and encourage historically underrepresented groups to apply.", "ex": "Entry-level", "rt": "Research, Policy", "po": "Full-time", "sa": "Not Found", "lg": "https://80000hours.org/wp-content/uploads/2019/12/yale-university.jpg", "oj": "https://your.yale.edu/work-yale/careers", "hi": false, "dp": "2024-04-18"}, {"id": 770, "t": "Solicitor", "o": "Advocates for Animals", "lk": "https://www.advocates-for-animals.com/_files/ugd/093987_3894d0f7df2c4cbf898126472bfb1e3a.pdf", "lo": "London, UK", "cl": "Rolling", "ar": "B. Animal welfare", "d": "* In this role, you'll join Advocates for Animals, the UK's first law firm dedicated solely to animal protection law, assisting with the organisation's strategy and goals.\n* Build client relationships with animal protection organisations while developing casework strategies.\n* Manage a heavy caseload requiring confident and creative legal approaches.\n* Conduct litigation to hold accountable those who break animal welfare laws.\n* Apply innovative legal strategies to ensure animal protection laws are properly understood and enforced.", "ex": "Mid (5-9 years experience)", "rt": "Legal", "po": "Full-time", "sa": "Not Found", "lg": "https://80000hours.org/wp-content/uploads/2025/06/advocates_for_animals_logo.jpeg", "oj": "https://www.advocates-for-animals.com/opportunities", "hi": false, "dp": "2025-06-04"}, {"id": 771, "t": "Volunteer, General Application", "o": "Alliance to Feed the Earth in Disasters", "lk": "https://allfed.info/join-us?view=article&id=309&catid=39", "lo": "Remote, Global", "cl": "Rolling", "ar": "3. Nuclear security", "d": "\"Volunteer in any of ALLFED’s main focus areas: Research: Play an active role in hands-on research involving collaborative meetings, rigorous methods, creative thinking, and a focus on publishing peer-reviewed articles. Organizational development: Dive into maintaining and improving ALLFED’s many systems. Communications: Work across a wide range of projects, including [...]\"", "ex": "Multiple experience levels", "rt": "Research", "po": "Volunteering", "sa": "Unpaid", "lg": "https://80000hours.org/wp-content/uploads/2022/01/allfed.jpeg", "oj": "https://allfed.info/join-us", "hi": false, "dp": "2022-11-28"}, {"id": 772, "t": "Entrepreneur in Residence, Product and Spinouts", "o": "Amodo Design", "lk": "https://amododesign.com/career/products-spinouts/", "lo": "Sheffield, UK · Remote, UK", "cl": "Rolling", "ar": "D. Career development: Technical", "d": "* In this role, you'll turn Amodo's engineering work into viable products and spinout companies.\n* Launch ready-made scientific instruments by owning the full go-to-market strategy from positioning to sales.\n* Identify product opportunities across Amodo's project portfolio where multiple clients have similar needs.\n* Develop strategic growth plans including new expertise fields, business models, or spinout opportunities.\n* Create spinouts by validating markets, mpanies that the Fund has invested in.\n* Includes a talent network.", "ex": "Multiple experience levels", "rt": "Software engineering, Operations, Strategy", "po": "Full-time", "sa": "Not Found", "lg": "https://80000hours.org/wp-content/uploads/2024/10/climate_pledge_fund_logo.png", "oj": "", "hi": false, "dp": "2024-10-25"}, {"id": 782, "t": "Program Manager, Malaria", "o": "Clinton Health Access Initiative", "lk": "https://careers-chai.icims.com/jobs/14150/program-manager%2c-malaria/job?in_iframe=1", "lo": "Hanoi, Vietnam", "cl": "Rolling", "ar": "A. Global health & development", "d": "- In this role, you'll lead the Vietnam CHAI malaria team, overseeing support to national health entities to optimise strategies for malaria elimination.\n- Oversee the design and scale-up of the disease surveillance system to ensure rapid and accurate malaria data reporting.\n- Support the government in updating national guidelines and policies to align with elimination goals.\n- Assist the Ministry of Health in identifying funding sources to address gaps in the national malaria strategic plan.", "ex": "Mid (5-9 years experience)", "rt": "Strategy", "po": "Full-time", "sa": "Not Found", "lg": "https://80000hours.org/wp-content/uploads/2022/10/Clinton-Health-Access-Initiative.png", "oj": "https://careers-chai.icims.com/jobs/search?ss=1&searchCategory=235937", "hi": false, "dp": "2025-03-06"}, {"id": 783, "t": "Manager, Maximum Impact Incubator", "o": "Clinton Health Access Initiative", "lk": "https://careers-chai.icims.com/jobs/14831/manager%2c-maximum-impact-incubator/job", "lo": "USA", "cl": "Rolling", "ar": "A. Global health & development", "d": "* In this role, you'll lead evaluation and prioritization of cost-effective health program opportunities to maximize global health impact.\n* Conduct rigorous analysis of intervention costs and effects through literature reviews and stakeholder engagement.\n* Evaluate evidence strength for health interventions, identifying data gaps and  "https://80000hours.org/wp-content/uploads/2023/12/Deep-Science-Ventures.jpeg", "oj": "https://deepscienceventures.com/careers", "hi": false, "dp": "2024-10-31"}, {"id": 786, "t": "Founder in Residence, Priming Plant Resilience for Climate Risks", "o": "Deep Science Ventures", "lk": "https://apply.workable.com/deep-science-ventures/j/E4DDEF7F2F", "lo": "Remote, Global", "cl": "Rolling", "ar": "Z. Climate change", "d": "* In this role, you'll lead the creation of a new venture developing on-demand plant resilience technologies that protect crops against climate risks.\n* Develop technical and commercial strategies for temporarily priming plants to withstand stress only when climate threats are imminent.\n* Build a platform integrating advances in RNA interventions, biologicals, and other emerging tools for climate-adaptive crop protection.\n* Prepare fundraising strategy and pitch to investors, with initial £250k investment and potential for significant equity ownership.", "ex": "Multiple experience levels", "rt": "Research, Strategy", "po": "Full-time", "sa": "£4,166 per month", "lg": "https://80000hours.org/wp-content/uploads/2023/12/Deep-Science-Ventures.jpeg", "oj": "https://deepscienceventures.com/careers", "hi": false, "dp": "2026-02-11"}, {"id": 787, "t": "Grant Recipient, Animal Welfare", "o": "EA Funds", "lk": "https://funds.effectivealtruism.org/funds/animal-welfare", "lo": "Remote, Global", "cl": "Rolling", "ar": "B. Animal welfare", "d": "\"The Animal Welfare Fund aims to effectively improve the well-being of nonhuman animals, by making grants that focus on one or more of the following: Relatively neglected geographic regions or groups of animals. Promising research into animal advocacy or animal well-being. Activities that could make it easier to help animals in the future. Otherwise best-in-class opportunities. The Animal Welfare Fund has historically supported many different interventions, including advocacy in neglected countries, research that improves our understanding of relevant issues, and campaigns that push large corporations to improve their farm animal welfare policies.\"", "ex": "Multiple experience levels", "rt": "Other, Policy, Research", "po": "Funding", "sa": "Not Found", "lg": "https://80000hours.org/wp-content/uploads/2023/04/EA-Funds.png", "oj": "https://toothsome-truffle-ec7.notion.site/Careers-at-EA-Funds-4d8add64d93d4bf98ad6999dff029dc1", "hi": false, "dp": "2021-12-20"}, {"id": 788, "t": "Grant Recipient, Long-Term Future", "o": "EA Funds", "lk": "https://funds.effectivealtruism.org/funds/far-future", "lo": "Remote, Global", "cl": "Rolling", "ar": "4. Macrostrategy", "d": "\"The Long-Term Future Fund aims to positively influence the long-term trajectory of civilization by making grants that address global catastrophic risks, especially potential risks from advanced artificial intelligence and pandemics. In addition, we seek to promote, implement, and advocate for longtermist ideas, and to otherwise increase the likelihood that future generations will flourish. Historically, we’ve funded a variety of longtermist projects [...]\"", "ex": "Multiple experience levels", "rt": "Other, Policy, Research", "po": "Funding", "sa": "Not Found", "lg": "https://80000hours.org/wp-content/uploads/2023/04/EA-Funds.png", "oj": "https://toothsome-truffle-ec7.notion.site/Careers-at-EA-Funds-4d8add64d93d4bf98ad6999dff029dc1", "hi": false, "dp": "2021-12-20"}, {"id": 789, "t": "Grant Recipient, Effective Altruism Infrastructure", "o": "EA Funds", "lk": "https://funds.effectivealtruism.org/funds/ea-community", "lo": "Remote, Global", "cl": "Rolling", "ar": "5. Building effective altruism", "d": "\"The Effective Altruism Infrastructure Fund recommends grants that aim to improve the work of projects that use the principles of effective altruism, by increasing their access to talent, capital, and knowledge. While the other three Funds support direct work on various causes, this Fund supports work that could multiply the impact of direct work, including projects that provide intellectual infrastructure for the effective altruism community, run events, disseminate information, or fundraise for effective charities [...]\"", "ex": "Multiple experience levels", "rt": "Other, Policy, Research", "po": "Funding", "sa": "Not Found", "lg": "https://80000hours.org/wp-content/uploads/2023/04/EA-Funds.png", "oj": "https://toothsome-truffle-ec7.notion.site/Careers-at-EA-Funds-4d8add64d93d4bf98ad6999dff029dc1", "hi": false, "dp": "2021-12-20"}, {"id": 790, "t": "Expressions of Interest, Fund Development Officer / Manager / Director", "o": "EA Funds", "lk": "https://toothsome-truffle-ec7.notion.site/Expression-of-interest-at-EA-Animal-Welfare-Fund-AWF-Fund-Development-Officer-Manager-Director-15192498bf4d80cbb382ddc7a9299747?pvs=4", "lo": "Remote, Global", "cl": "Rolling", "ar": "B. Animal welfare", "d": "- Express interest in a role focused on expanding grantmaking capacity through developing fundraising strategies. \n- Build relationships with major donors and institutional funders. \n- Effectively communicate the impact in alleviating animal suffering globally.", "ex": "Multiple experience levels", "rt": "Outreach, Strategy", "po": "Full-time", "sa": "Not Found", "lg": "https://80000hours.org/wp-content/uploads/2023/04/EA-Funds.png", "oj": "https://toothsome-truffle-ec7.notion.site/Careers-at-EA-Funds-4d8add64d93d4bf98ad6999dff029dc1", "hi": false, "dp": "2024-12-05"}, {"id": 791, "t": "Technical Operator, Kenya", "o": "Essential", "lk": "https://drive.google.com/file/d/12DKjjH_y5pfVkwJVG79Yu_MsmXteiQKF/view", "lo": "Kenya", "cl": "Rolling", "ar": "A. Global health & development", "d": "\"Essential is recruiting a Technical Operator to join the operations team in Kenya. You will be responsible for operating and monitoring fermentation and supporting equipment to produce high- quality proteins. Your primary focus will be on maintaining optimal conditions for fermentation and downstream processes, ensuring process efficiency, and adhering to safety and quality standards. Roles & Responsibilities: Operate fermentation and downstream equipment and monitor processes according to established procedures and protocols; Set up and [...]\"", "ex": "Mid (5-9 years experience)", "rt": "Engineering", "po": "Full-time", "sa": "Not Found", "lg": "https://80000hours.org/wp-content/uploads/2023/01/Essential-Impact.png", "oj": "https://www.essentialimpact.org/get-involved#careers", "hi": false, "dp": "2024-02-01"}, {"id": 792, "t": "International Knowledge Worker", "o": "Fish Welfare Initiative", "lk": "https://docs.google.com/forms/d/1N6KhdzxQ0TP88b6f0eFMN-HsE1Vw9g01TVswpPmH0Yo/edit", "lo": "India", "cl": "Rolling", "ar": "B. Animal welfare", "d": "\"Our international knowledge worker roles could be a great fit for someone with strong generalist skills, and with interest in living in India and/or China for part of the year. While Indian applicants are encouraged, applicants of all nationalities are welcome. Roles of this type include management (people and project), research, operations, communications, and leadership.\"", "ex": "Multiple experience levels", "rt": "Management, Operations", "po": "Full-time,Part-time", "sa": "Not Found", "lg": "https://80000hours.org/wp-content/uploads/2022/05/Fish-Welfare-Initiative.png", "oj": "https://www.fishwelfareinitiative.org/jobs", "hi": false, "dp": "2023-05-16"}, {"id": 793, "t": "Expression of Interest, China Program", "o": "Fish Welfare Initiative", "lk": "https://docs.google.com/forms/d/e/1FAIpQLScIMb7n84YrNQarok5dU5ZnptsB7qbqLvb6Dab0f1FwuvZ7Kg/viewform", "lo": "China", "cl": "Rolling", "ar": "B. Animal welfare", "d": "- In this role, you'll collaborate on important initiatives specifically designed for our China program.\n- Develop and execute strategic plans to enhance our engagement in China.\n- Conduct research to identify emerging trends and opportunities within the Chinese market.\n- Build and maintain relationships with key stakeholders, including local partners and government officials.\n- Contribute ideas and insights to continuously improve the effectiveness and reach of the program.", "ex": "Multiple experience levels", "rt": "Outreach, Policy", "po": "Full-time", "sa": "Not Found", "lg": "https://80000hours.org/wp-content/uploads/2022/05/Fish-Welfare-Initiative.png", "oj": "https://www.fishwelfareinitiative.org/jobs", "hi": false, "dp": "2024-07-25"}, {"id": 794, "t": "Senior Researcher", "o": "Forecasting Research Institute", "lk": "https://forecastingresearch.org/careers/research-manager", "lo": "Remote, Global", "cl": "Rolling", "ar": "", "d": "- In this role you would manage one or more research projects.\n- Coordinate a team of research analysts and assistants, delegate tasks, and ensure projects stay on track to meet deadlines.\n- Contribute to the design of research projects to advance the science of forecasting or make it more useful to policymakers.\n- Plan data collection and ensure smooth implementation.\n- Interpret research results, identifying key findings and implications for policy and philanthropic priorities.", "ex": "Mid (5-9 years experience)", "rt": "Research, Management", "po": "Full-time", "sa": "$85,000 - $130,000", "lg": "https://80000hours.org/wp-content/uploads/2022/12/Icon.png", "oj": "https://forecastingresearch.org/participate", "hi": false, "dp": "2024-09-04"}, {"id": 795, "t": "Senior LLM Researcher", "o": "Forecasting Research Institute", "lk": "https://forecastingresearch.org/careers/senior-llm-researcher", "lo": "Remote, Global", "cl": "Rolling", "ar": "", "d": "* In this role, you'll manage research projects applying LLMs to improve forecasting for policymakers and advance forecasting science.\n* Coordinate research teams, delegate tasks, and ensure projects meet deadlines.\n* Design research projects that enhance forecasting science and its practical applications.\n* Oversee data collection, analysis, and interpretation of key findings for policy implications.\n* Lead the writing of project reports and academic papers while evaluating research effectiveness.", "ex": "Mid (5-9 years experience)", "rt": "Research, Management", "po": "Full-time", "sa": "Not Found", "lg": "https://80000hours.org/wp-content/uploads/2022/12/Icon.png", "oj": "https://forecastingresearch.org/participate", "hi": false, "dp": "2025-06-05"}, {"id": 796, "t": "Fellows", "o": "fp21", "lk": "https://drive.google.com/file/d/18G_FSF46BunvO9qYQ1C1qU2RTJr8jOa7/view", "lo": "Remote, Global", "cl": "Rolling", "ar": "6. Career development: Policy & government", "d": "- The fp21 Fellow will support fp21’s mission while building their expertise and networks.\n- Write at least one piece related to foreign policy reform for posting on the fp21 website.\n- Promote fp21 content on social media and to academic and government peers.\n- Include fp21 association in relevant circumstances, such as in media bios.\n- Adhere to fp21's Intellectual Property Understanding regarding work produced.", "ex": "Multiple experience levels", "rt": "Policy", "po": "Fellowship", "sa": "Not Found", "lg": "https://80000hours.org/wp-content/uploads/2022/02/fp21.jpeg", "oj": "https://www.fp21.org/collaborate", "hi": false, "dp": "2024-06-17"}, {"id": 797, "t": "Executive-in-Residence", "o": "Geneva Centre for Security Policy", "lk": "https://www.gcsp.ch/executive-residence", "lo": "Geneva, Switzerland", "cl": "Rolling", "ar": "6. Career development: Policy & government", "d": "- As an Executive-in-Residence, you will be able to take part in a 2-6 month residency at the GCSP.\n- Progress with a professional project while benefiting from the feedback of a vibrant and dynamic network.\n- Build strong relations with the GCSP Global Community.\n- Have access to GCSP experts, staff and course participants, as well as professional development opportunities.\n- Explore opportunities in the heart of international Geneva, host of 43 international organisations, more than rtnerships with tech funders, AI labs, and international organizations to expand J-PAL's influence.\n* Secure funding for AI-related research while stewarding relationships with donors and agencies.\n* Shape J-PAL's strategic objectives for AI in development across sectors and regions.", "ex": "Mid (5-9 years experience),Senior (10+ years experience)", "rt": "Strategy, Management", "po": "Full-time", "sa": "Not Found", "lg": "https://cdn.80000hours.org/wp-content/uploads/2018/05/j-pal-150x150.jpg", "oj": "https://www.povertyactionlab.org/careers", "hi": false, "dp": "2026-02-05"}, {"id": 810, "t": "Pilot Program", "o": "Northeastern University, National Deep Inference Fabric", "lk": "https://ndif.us/405b.html", "lo": "Remote, USA", "cl": "Rolling", "ar": "D. Career development: Technical", "d": "* In this role, you'll conduct groundbreaking experiments on the Llama 3.1 405b model while helping test new research infrastructure.\n* Access terabytes of GPU resources and utilize the NNsight PyTorch API for remote experimentation.\n* Leverage full access to internal activations, gradients, and model editing capabilities.\n* Design innovative experiments that go beyond conventional benchmarking and exploit unique access to model internals.\n* Contribute to interdisciplinary research that advances AI while helping shape the future of research infrastructure.", "ex": "Multiple experience levels", "rt": "Research", "po": "Other", "sa": "Not Found", "lg": "https://80000hours.org/wp-content/uploads/2024/05/northeastern_university_logo.png", "oj": "https://ndif.us/start.html#jobs", "hi": false, "dp": "2025-07-28"}, {"id": 811, "t": "Technical Remediation Manager", "o": "Pure Earth", "lk": "https://www.pureearth.org/wp-content/uploads/2026/02/Technical-Remediation-Manager.pdf", "lo": "New York · NY, USA", "cl": "Rolling", "ar": "A. Global health & development", "d": "* In this role, you'll provide technical guidance on contaminated site assessment and risk mitigation within Pure Earth's Global Lead Program.\n* Develop protocols, guidance documents, and country-specific remediation guidelines for environmental interventions.\n* Deliver technical support and field training on environmental sampling, XRF usage, and site remediation alternatives.\n* Support collection, analysis, and use of environmental data to inform intervention designs and evaluate impact.\n* Contribute to research publications and represent Pure Earth at key stakeholder events.", "ex": "Mid (5-9 years experience)", "rt": "Engineering", "po": "Full-time", "sa": "$80,000 - $96,900", "lg": "https://80000hours.org/wp-content/uploads/2022/12/Pure-Earth.jpeg", "oj": "https://www.pureearth.org/about-us/jobs/", "hi": false, "dp": "2026-02-04"}, {"id": 812, "t": "Program Management Consultant, Malawi", "o": "Pure Earth", "lk": "https://www.pureearth.org/wp-content/uploads/2026/02/Program-Manager-Consultant-Malawi.pdf", "lo": "Malawi", "cl": "Rolling", "ar": "A. Global health & development", "d": "* In this role, you'll lead project scoping for lead poisoning prevention and mitigation efforts in Malawi.\n* Identify and build relationships with key stakeholders across government, academia, and private sectors.\n* Conduct a desk review of Malawi's lead landscape, documenting health impacts and exposure sources.\n* Research operational requirements for establishing Pure Earth in Malawi, including legal support and staffing.\n* Develop a project work plan aligned with local context, government priorities, and organizational mission.", "ex": "Mid (5-9 years experience)", "rt": "Strategy, Outreach", "po": "Full-time", "sa": "Not Found", "lg": "https://80000hours.org/wp-content/uploads/2022/12/Pure-Earth.jpeg", "oj": "https://www.pureearth.org/about-us/jobs/", "hi": false, "dp": "2026-02-13"}, {"id": 813, "t": "Program Management Consultant, Rwanda", "o": "Pure Earth", "lk": "https://www.pureearth.org/wp-content/uploads/2026/02/Program-Manager-Consultant-Rwanda-.pdf", "lo": "Rwanda", "cl": aissancephilanthropy.org/careers/", "hi": false, "dp": "2025-11-20"}, {"id": 817, "t": "Senior Manager, Research and Origination, Fund Ecosystem", "o": "Renaissance Philanthropy", "lk": "https://www.renaissancephilanthropy.org/careers/senior-manager-research-and-origination-fund-ecosystem", "lo": "Remote, Global · New York", "cl": "Rolling", "ar": "A. Global health & development", "d": "* In this role, you'll design, launch, and evaluate philanthropic funds focused on global health, development, and other key challenges.\n* Research high-impact opportunities and develop systematic processes for originating new potential funds.\n* Incubate early-stage projects, helping promising ideas develop into fundable initiatives.\n* Build relationships with stakeholders including policymakers, scientists, and experts in low-income countries.\n* Design evaluation frameworks to assess performance of existing and potential funds across diverse topics.", "ex": "Mid (5-9 years experience),Senior (10+ years experience)", "rt": "Research, Strategy", "po": "Full-time", "sa": "$140,000 - $190,000", "lg": "https://80000hours.org/wp-content/uploads/2025/02/renaissance_philanthropy_logo.jpeg", "oj": "https://renaissancephilanthropy.org/careers/", "hi": false, "dp": "2026-01-07"}, {"id": 818, "t": "Co-Director", "o": "Rethink Wellbeing", "lk": "https://forms.gle/pVbR2oX6oQemkwvn6", "lo": "Remote, Philippines", "cl": "Rolling", "ar": "A. Global health & development", "d": "* In this role, you'll co-lead a global mental health nonprofit, shaping strategic direction during a pivotal growth phase.\n* Develop strategies to scale mental health programs globally with initial focus on the Philippines.\n* Build funder relationships, run donation campaigns, and identify monetization opportunities for sustainable financing.\n* Represent the organization in global mental health spaces and establish partnerships with key stakeholders.\n* Enable teams to evolve service delivery and build systems for a gr function mscore(jA,jR,p){
  const aT1=p.t1a.some(a=>jA.includes(a));
  const rT1=p.t1r.length===0||p.t1r.some(r=>jR.includes(r));
  if(aT1&&rT1)return 1;
  const aT2=p.t2a.some(a=>jA.includes(a));
  const rT2=p.t2r.length>0&&p.t2r.some(r=>jR.includes(r));
  if(aT1||aT2||rT2)return 2;
  return 0;
}
function cForJob(job){
  const jA=plist(job.ar),jR=plist(job.rt);
  return COURSES.map(c=>{const p=CP[c.t];if(!p)return null;const s=mscore(jA,jR,p);return s?{item:c,tier:s,why:p.why}:null}).filter(Boolean).sort((a,b)=>a.tier-b.tier);
}
function jForCourse(c){
  const p=CP[c.t];if(!p)return[];
  return NONCRS.map(j=>{const jA=plist(j.ar),jR=plist(j.rt);const s=mscore(jA,jR,p);return s?{item:j,tier:s}:null}).filter(Boolean).sort((a,b)=>a.tier-b.tier||(b.dp||'').localeCompare(a.dp||''));
}

    h+=t1.map(m=>{
      const it=m.item;
      const ic=(it.o||it.t||'?').split(/[\s\-]+/).map(w=>w[0]).join('').slice(0,2).toUpperCase();
      const lg=it.lg?`<img class="xlo" src="${esc(it.lg)}" alt="" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'"><div class="xln" style="display:none">${esc(ic)}</div>`:`<div class="xln">${esc(ic)}</div>`;
      const badge=isc?ptag(it.po):(it.ar?plist(it.ar).slice(0,1).map(a=>{const s=a.replace(/^\d+\. /,'').replace(/^[A-Z]\. /,'');return`<span class="tg ${ACLS[a]||'to'}" style="font-size:10px">${esc(s)}</span>`}).join(''):'');
      return`<div class="xli" onclick="jump(${it.id})">${lg}<div class="xlmi"><div class="xlmt">${esc(it.t)}</div><div class="xlmo">${esc(it.o)}</div></div><div class="xlbg">${badge}</div></div>`;
    }).join('');
    h+=`</div>`;
    if(!isc&&t1[0]&&t1[0].why)h+=`<div class="xlwhy">${esc(t1[0].why)}</div>`;
  }
  if(t2.length){
    h+=`<div class="tlbl tlbl2">Also useful background</div><div class="xll">`;
    h+=t2.map(m=>{
      const it=m.item;
      const ic=(it.o||it.t||'?').split(/[\s\-]+/).map(w=>w[0]).join('').slice(0,2).toUpperCase();
      const lg=it.lg?`<img class="xlo" src="${esc(it.lg)}" alt="" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'"><div class="xln" style="display:none">${esc(ic)}</div>`:`<div class="xln">${esc(ic)}</div>`;
      const badge=isc?ptag(it.po):(it.ar?plist(it.ar).slice(0,1).map(a=>{const s=a.replace(/^\d+\. /,'').replace(/^[A-Z]\. /,'');return`<span class="tg ${ACLS[a]||'to'}" style="font-size:10px">${esc(s)}</span>`}).join(''):'');
      return`<div class="xli" onclick="jump(${it.id})">${lg}<div class="xlmi"><div class="xlmt">${esc(it.t)}</div><div class="xlmo">${esc(it.o)}</div></div><div class="xlbg">${badge}</div></div>`;
    }).join('');
    h+=`</div>`;
  }
  h+=`</div>`;
  return h;
}

// ── Card HTML ─────────────────────────────────────────────────────────────
function cardHtml(item,open){
  const areas=plist(item.ar).slice(0,2);
  const ds=item.dp?item.dp.slice(5).replace('-','/'):'';
  let h=`<div class="ch" onclick="tog(${item.id})">
    ${logoHtml(item,false)}
    <div class="cm">
      <div class="ct2">${esc(item.t)}</div>
      <div class="co">${esc(item.o)}</div>
      ${item.lo?`<div class="cloc"><svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="opacity:.5;flex-shrink:0"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>${esc(item.lo)}</div>`:''}
      <div class="ctags">${ptag(item.po)}${etag(item.ex)}${areas.map(atag).join('')}</div>
    </div>
    <div class="cr"><span class="cdate">${esc(ds)}</span><span class="chev">⌄</span></div>
  </div>`;
  if(!open)return h;
  const cl=item.cl==='Rolling'?'Rolling applications':item.cl||'—';
  h+=`<div class="cb">
    <div class="slbl">Description</div>${fmtd(item.d)}
    <div class="slbl" style="margin-top:14px">Key Details</div>
    <div class="kg">
      ${item.lo?`<div class="ki"><label>Location</label><span>${esc(item.lo)}</span></div>`:''}
      ${item.ex?`<div class="ki"><label>Experience</label><span>${esc(shortEx(item.ex))}</span></div>`:''}
      ${item.rt?`<div class="ki"><label>Role type</label><span>${esc(item.rt)}</span></div>`:''}
      ${item.sa?`<div class="ki"><label>Salary</label><span>${esc(item.sa)}</span></div>`:''}
      <div class="ki"><label>Applications close</label><span>${esc(cl)}</span></div>
      ${item.ar?`<div class="ki"><label>Problem areas</label><span style="font-size:12px">${esc(item.ar)}</span></div>`:''}
    </div>
    ${xlHtml(item)}
    ${item.lk?`<a class="vbtn" href="${esc(item.lk)}" target="_blank" rel="noopener">View opportunity details ${EARROW}</a>`:''}
  </div>`;
  return h;
}

// ── Render ────────────────────────────────────────────────────────────────
function visible(){
  const q=FQ.toLowerCase();
  return DATA.filter(d=>{
    if(FP!=='All'&&!d.po.split(',').map(x=>x.trim()).includes(FP))return false;
    if(FA!=='All'&&!d.ar.includes(FA))return false;
    if(q&&!d.t.toLowerCase().includes(q)&&!d.o.toLowerCase().includes(q))return false;
    return true;
  }).sort((a,b)=>(b.dp||'').localeCompare(a.dp||''));
}

function render(){
  const vis=visible();
  const list=document.getElementById('cl');
  document.getElementById('rct').textContent=`${vis.length} opportunities`;
  document.getElementById('empty').style.display=vis.length?'none':'block';
  const frag=document.createDocumentFragment();
  for(const item of vis){
    const d=document.createElement('div');
    const open=item.id===EX;
    d.className=`card${open?' open':''}${item.hi?' hl':''}`;
    d.id=`c${item.id}`;
    d.innerHTML=cardHtml(item,open);
    frag.appendChild(d);
  }
  list.innerHTML='';
  list.appendChild(frag);
}

// ── Interactions ──────────────────────────────────────────────────────────
function tog(id){EX=EX===id?null:id;render();if(EX!==null){const e=document.getElementById('c'+id);if(e)setTimeout(()=>e.scrollIntoView({behavior:'smooth',block:'nearest'}),50)}}
function jump(id){
  const item=DATA.find(d=>d.id===id);if(!item)return;
  EX=id;
  const p=item.po.split(',')[0].trim();
  if(FP!=='All'&&FP!==p)FP='All';
  if(FA!=='All'&&!item.ar.includes(FA))FA='All';
  render();buildFilters();
  const e=document.getElementById('c'+id);if(e)setTimeout(()=>e.scrollIntoView({behavior:'smooth',block:'start'}),50);
}

// ── Filters ───────────────────────────────────────────────────────────────
function buildFilters(){
  document.getElementById('pf').innerHTML=UPOS.map(p=>`<button class="fb${FP===p?' on':''}" onclick="setP('${p.replace(/'/g,"\\'")}')"><span>${esc(p)}</span><span class="ct">${npos(p)}</span></button>`).join('');
  document.getElementById('af').innerHTML=UAREA.map(a=>{const s=a==='All'?'All areas':a.replace(/^\d+\. /,'').replace(/^[A-Z]\. /,'');return`<button class="fb${FA===a?' on':''}" onclick="setA('${a.replace(/'/g,"\\'")}')"><span>${esc(s)}</span><span class="ct">${narea(a)}</span></button>`}).join('');
}
function setP(p){FP=p;EX=null;buildFilters();render()}
function setA(a){FA=a;EX=null;buildFilters();render()}
document.getElementById('srch').addEventListener('input',function(){FQ=this.value;EX=null;render()});

// ── Init ──────────────────────────────────────────────────────────────────
buildFilters();
render();
</script>
</body>
</html>
