 "Research, Information security", "po": "Full-time", "sa": "$230,000 - $290,000", "lg": "https://80000hours.org/wp-content/uploads/2024/03/Anthropic.png", "oj": "https://www.anthropic.com/jobs", "hi": false, "dp": "2026-01-14"}, {"id": 420, "t": "General Application", "o": "Coefficient Giving", "lk": "https://jobs.ashbyhq.com/coefficientgiving/2cc48fa8-97aa-47d8-b367-bf3b66cdba3f", "lo": "San Francisco Bay Area, USA", "cl": "Rolling", "ar": "5. Building effective altruism,1. AI safety & policy,2. Biosecurity & pandemic preparedness,A. Global health & development,4. Macrostrategy", "d": "\"Fill out the form below to let us know you'd be interested in working at Open Philanthropy. It's okay if you're not sure what kind of role you'd be interested in or might not be available right away. We'll review general applications on a rolling basis and reach out if we think you might be a good fit. We're looking forward to hearing from you!\"", "ex": "Multiple experience levels", "rt": "Operations, Research", "po": "Full-time", "sa": "Not Found", "lg": "https://80000hours.org/wp-content/uploads/2025/11/coefficient_giving_logo.jpg", "oj": "https://coefficientgiving.org/about-us/careers/", "hi": false, "dp": "2022-07-13"}, {"id": 421, "t": "Expression of Interest, Pannu Lab", "o": "Johns Hopkins University, Center for Health Security", "lk": "https://forms.gle/q7iwQB2VvurjMiT4A", "lo": "Washington · DC metro area, USA", "cl": "Rolling", "ar": "2. Biosecurity & pandemic preparedness,1. AI safety & policy", "d": "* In this role, you'll conduct research on biosecurity topics including AI for biology, biosafety of AI, resilience approaches, and dual-use synthetic biology.\n* Perform both technical and policy work across multiple biosecurity domains.\n* Engage directly with stakeholders on sensitive biosecurity matters.\n* Contribute to public research publications and non-public projects.\n* Develop expertise at the intersection of emerging technologies and biosecurity.", "ex": "Multiple experience levels", "rt": "Research", "po": "Full-time", "sa": "Not Found", "lg": "https://80000hours.org/wp-content/uploads/2020/04/Johns-hopkins-university.png", "oj": "https://www.centerforhealthsecurity.org/who-we-are/work-with-us/", "hi": false, "dp": "2025-12-09"}, {"id": 422, "t": "Research Scientist / Engineer, Honesty", "o": "Anthropic", "lk": "https://job-boards.greenhouse.io/anthropic/jobs/4532887008", "lo": "San Francisco Bay Area, USA", "cl": "Rolling", "ar": "1. AI safety & policy", "d": "- As a Research Scientist/Engineer focused on honesty within the Finetuning Alignment team, you'll spearhead the development of techniques to minimise hallucinations and enhance truthfulness in language models.\n- Design and implement novel data curation pipelines to identify, verify, and filter training data for accuracy.\n- Develop specialised classifiers to detect potential hallucinations or miscalibrated claims made by the model.\n- Create and maintain comprehensive honesty benchmarks and evaluation frameworks.", "ex": "Junior (1-4 years experience),Mid (5-9 years experience)", "rt": "Research, Software engineering", "po": "Full-time", "sa": "$280,000 - $425,000", "lg": "https://80000hours.org/wp-content/uploads/2024/03/Anthropic.png", "oj": "https://www.anthropic.com/jobs", "hi": true, "dp": "2025-03-04"}, {"id": 423, "t": "Research Manager, Interpretability", "o": "Anthropic", "lk": "https://job-boards.greenhouse.io/anthropic/jobs/4980436008", "lo": "San Francisco Bay Area, USA", "cl": "Rolling", "ar": "1. AI safety & policy", "d": "* In this role, you'll manage a team of researchers and engineers working to understand the internal mechanisms of large language models for AI safety.\n* Partner with research leads to translate cutting-edge research ideas into tangible goals and oversee their execution.\n* Coach team members to maximize their impact while supporting their career development.\n* Drive recruiting efforts including hiring planning, process improvements, and candidate sourcing.\n* Facilitate collaboration across teams and communicate research progress to leadership.", "ex": "Junior (1-4 years experience),Mid (5-9 years experience)", "rt": "Management, Research", "po": "Full-time", "sa": "$340,000 - $425,000", "lg": "https://80000hours.org/wp-content/uploads/2024/03/Anthropic.png", "oj": "https://www.anthropic.com/jobs", "hi": false, "dp": "2025-11-10"}, {"id": 424, "t": "Research Scientist, Interpretability", "o": "Anthropic", "lk": "https://job-boards.greenhouse.io/anthropic/jobs/4980427008", "lo": "San Francisco Bay Area, USA", "cl": "Rolling", "ar": "1. AI safety & policy", "d": "* In this role, you'll conduct research to reverse-engineer how language models work, developing a mechanistic understanding to make advanced AI systems safer.\n* Develop methods for understanding LLMs by reverse engineering algorithms learned in their weights.\n* Design and run robust experiments in both toy scenarios and at scale in large models.\n* Create and analyze new interpretability features and circuits to better understand how models work.\n* Build infrastructure for experiments and visualize results while communicating findings effectively.", "ex": "Junior (1-4 years experience)", "rt": "Research, Software engineering", "po": "Full-time", "sa": "$315,000 - $560,000", "lg": "https://80000hours.org/wp-content/uploads/2024/03/Anthropic.png", "oj": "https://www.anthropic.com/jobs", "hi": false, "dp": "2025-11-10"}, {"id": 425, "t": "Program Manager", "o": "Center for AI Safety", "lk": "https://jobs.lever.co/aisafety/0431d90d-82d9-4f82-b89b-ce51974906e7", "lo": "San Francisco Bay Area, USA", "cl": "Rolling", "ar": "1. AI safety & policy", "d": "* In this role, you'll lead AI safety initiatives including fellowships, workshops, publications, and policy projects at the Center for AI Safety.\n* Develop project plans with clear objectives, deliverables, timelines, and resources.\n* Implement projects from inception to completi tribution.\n* Monitor AI safety news daily to identify and highlight the most relevant stories each week.\n* Collaborate with team members to get story approvals and implement revisions.\n* Craft clear, accessible content that aligns with the newsletter's established style guidelines.", "ex": "Junior (1-4 years experience)", "rt": "Outreach, Other", "po": "Full-time,Part-time", "sa": "$80,000 - $110,000", "lg": "https://80000hours.org/wp-content/uploads/2023/11/Center-for-AI-safety.jpeg", "oj": "https://www.safe.ai/careers", "hi": true, "dp": "2026-02-09"}, {"id": 428, "t": "Communications Lead, Research Translation", "o": "Center for AI Safety", "lk": "https://jobs.lever.co/aisafety/a495b93a-07be-446e-a221-0694bf7d5ae3", "lo": "San Francisco Bay Area, USA", "cl": "Rolling", "ar": "1. AI safety & policy", "d": "* In this role, you'll translate complex AI research into accessible public communication materials like explainers, FAQs, and briefs.\n* Partner with researchers and spokespersons to develop accurate and engaging content.\n* Maintain consistent voice, tone, and style across all communications outputs.\n* Conduct thorough fact-checking and quality control to ensure editorial excellence.\n* Support media preparation and develop briefing materials for public engagement.", "ex": "Junior (1-4 years experience),Mid (5-9 years experience)", "rt": "Outreach", "po": "Full-time", "sa": "$110,000 - $180,000", "lg": "https://80000hours.org/wp-content/uploads/2023/11/Center-for-AI-safety.jpeg", "oj": "https://www.safe.ai/careers", "hi": true, "dp": "2026-03-02"}, {"id": 429, "t": "Research Engineer Intern (Fall 2026)", "o": "Center for AI Safety", "lk": "https://jobs.lever.co/aisafety/e011814b-9a80-43d6-bb0c-cc153ea4bec4", "lo": "San Francisco Bay Area, USA", "cl": "Rolling", "ar": "1. AI safety & policy", "d": "* In this role, you'll contribute to AI safety research on security, ethics, alignment, and benchmarking AI risks.\n* Plan and run machine learning experiments at scale leveraging our internal compute cluster.\n* Conduct code reviews and collaborate with a small team to develop impactful research publications.\n* Debate and defend your own experimental approaches and contribute to project direction.\n* Take ownership of your contributions and work as a colleague within the research team.", "ex": "Entry-level", "rt": "Research, Software engineering", "po": "Internship", "sa": "$9,700 - $19,000 stipend", "lg": "https://80000hours.org/wp-content/uploads/2023/11/Center-for-AI-safety.jpeg", "oj": "https://www.safe.ai/careers", "hi": true, "dp": "2026-03-11"}, {"id": 430, "t": "Special Projects Manager", "o": "Center for AI Safety", "lk": "https://jobs.lever.co/aisafety/a510a964-6425-405d-b757-cb7bfd19c994", "lo": "San Francisco Bay Area, USA", "cl": "Rolling", "ar": "1. AI safety & policy", "d": "* In this role, you'll identify, evaluate, and launch new AI-safety initiatives from conception through delivery.\n* Generate and rapidly evaluate new project ideas while conducting research to define clear goals and success metrics.\n* Build detailed project plans with objectives, deliverables, timelines, budgets, and resource allocations.\n* Own day-to-day execution, monitoring risks, tracking budgets, and maintaining up-to-date project documentation.\n* Coordinate with researchers, vendors, and external partners, adapting to changing requirements and priorities.", "ex": "Junior (1-4 years experience)", "rt": "Strategy, Operations", "po": "Full-time", "sa": "$110,000 - $150,000", "lg": "https://80000hours.org/wp-content/uploads/2023/11/Center-for-AI-safety.jpeg", "oj": "https://www.safe.ai/careers", "hi": true, "dp": "2026-03-11"}, {"id": 431, "t": "Evaluators, Systematic Reviews", "o": "Elicit", "lk": "https://docs.google.com/forms/d/1cYNcejGHniGJ4Cvi_SCWuuGWK5C5f_zOnQENa1rLldQ/viewform?edit_requested=true", "lo": "Remote, Global", "cl": "Rolling", "ar": "1. AI safety & policy", "d": "- In this role, you'll evaluate reviews written with Elicit's help in life sciences and social science. Reviews will be on topics of your choice, providing in-depth analysis. \n- Ensure evaluations are of high quality to improve Elicit's output. \n- Work will be available intermittently.", "ex": "Entry-level", "rt": "Research", "po": "Full-time", "sa": "$55 per hour", "lg": "https://80000hours.org/wp-content/uploads/2023/09/Elicit.png", "oj": "https://elicit.com/careers", "hi": false, "dp": "2024-10-29"}, {"id": 432, "t": "Frontend Engineer", "o": "Elicit", "lk": "https://elicit.com/careers?ashby_jid=b5e218b8-8730-4254-b026-1fe2fe02c3eb", "lo": "Remote, USA · San Francisco Bay Area, USA", "cl": "Rolling", "ar": "1. AI safety & policy", "d": "- In this role, you'll help us meet demand growth while pushing the bar for quality and user experience higher.\n- Build Elicit into a product that researchers can’t live without by working with a modern front-end stack.\n- Own shipping useful, exciting features to users on a weekly basis, balancing short-term delivery with long-term system building.\n- Advocate for smooth user workflows and ensure the product looks great and is delightful to use.\n- Contribute to discussions around UX, system design, and architecture, appreciating the user needs underlying your work.", "ex": "Junior (1-4 years experience),Mid (5-9 years experience)", "rt": "Software engineering", "po": "Full-time", "sa": "$180,000 - $225,000", "lg": "https://80000hours.org/wp-content/uploads/2023/09/Elicit.png", "oj": "https://elicit.com/careers", "hi": false, "dp": "2024-12-18"}, {"id": 433, "t": "Machine Learning Engineer", "o": "Elicit", "lk": "https://elicit.com/careers?ashby_jid=913a03d5-bd26-4c64-8346-21a029f344f7", "lo": "Remote, USA · San Francisco Bay Area, USA", "cl": "Rolling", "ar": "1. AI safety & policy", "d": "- As an ML research engineer at Elicit, you will compose together tens to thousands of calls to language models to accomplish tasks that can't be accomplished with a single call.\n- Curate datasets for fine-tuning models, e.g., for training models to extract policy conclusions from papers.\n- Set up evaluation metrics that determine what changes to models or training setups qualify as improvements.\n- Scale up semantic search from a few thousand documents to 100k documents.", "ex": "Junior (1-4 years experience),Mid (5-9 years experience)", "rt": "Software engineering", "po": "Full-time", "sa": "$195,000 - $250,000", "lg": "https://80000hours.org/wp-content/uploads/2023/09/Elicit.png", "oj": "https://elicit.com/careers", "hi": false, "dp": "2024-12-18"}, {"id": 434, "t": "ML Research Resident (Q1 2025)", "o": "Elicit", "lk": "https://elicit.com/careers?ashby_jid=e04136b7-57e5-44d5-9a7c-cced3e2cb0f8", "lo": "Remote, USA · San Francisco Bay Area, USA", "cl": "Rolling", "ar": "1. AI safety & policy", "d": "- In this role, you'll work for 3 months on developing computational procedures that can reliably improve a knowledge state over thousands of iterations.\n- Focus on designing and testing improvement operators that maintain stability over 1000 iterations while making genuine progress.\n- Start with simple cases like shallow refactoring of scientific papers and demonstrate reliable iteration before scaling up to complex tasks.\n- Develop systems that perform legible reasoning over long horizons to address core challenges in AI transparency and scalable reasoning.", "ex": "Junior (1-4 years experience),Mid (5-9 years experience)", "rt": "Research", "po": "Full-time", "sa": "$12,000 - 15,000 per month", "lg": "https://80000hours.org/wp-content/uploads/2023/09/Elicit.png", "oj": "https://elicit.com/careers", "hi": false, "dp": "2024-12-18"}, {"id": 435, "t": "Data Scientist", "o": "Epoch AI", "lk": "https://jobs.lever.co/epoch-ai/ab88ba6e-6a92-44cc-8830-a2dafca31f1a", "lo": "Remote, Global", "cl": "Rolling", "ar": "1. AI safety & policy", "d": "* In this role, you'll gather and analyze data on AI technologies and infrastructure to inform research and policy decisions.\n* Review technical literature and extract key details about model architectures and AI advancements.\n* Track and compile benchmark scores and performance metrics from various AI systems.\n* Analyze financial disclosures and news media for insights about AI companies.\n* Produce informed estimates on the physical infrastructure supporting AI development.", "ex": "Junior (1-4 years experience)", "rt": "Research", "po": "Full-time", "sa": "$30 - $40 per hour", "lg": "https://80000hours.org/wp-content/uploads/2024/11/epoch_ai_logo.jpeg", "oj": "https://epoch.ai/about/careers", "hi": true, "dp": "2025-12-23"}, {"id": 436, "t": "Student Intern, Machine Learning, Safety, Security and Privacy (Expression of Interest)", "o": "Google DeepMind", "lk": "https://docs.google.com/forms/d/e/1FAIpQLSemEPS7apiFoQiv91EX5cz0GWSUBcUhuiDeKGLwWrHoiJd4nw/viewform", "lo": "London, UK", "cl": "Rolling", "ar": "1. AI safety & policy", "d": "\"With this form we are trying to measure interest in in-person student internships at Google DeepMind, London. During the internship the student will be expected to conduct research at the intersection of Machine Learning, Safety, Security and Privacy. Note that the position is only open to students current enrolled into Bachelor's, Master's or PhD programmes.\"", "ex": "Entry-level", "rt": "Software engineering, Information security", "po": "Internship", "sa": "Not Found", "lg": "https://80000hours.org/wp-content/uploads/2022/12/DeepMind.png", "oj": "https://deepmind.com/careers/jobs", "hi": true, "dp": "2023-10-19"}, {"id": 437, "t": "Software Engineer, LessWrong", "o": "Lightcone Infrastructure", "lk": "https://www.lightconeinfrastructure.com/lesswrong-software.html", "lo": "San Francisco Bay Area, USA", "cl": "Rolling", "ar": "1. AI safety & policy", "d": "\"Lightcone Infrastructure is hiring full-stack software engineers to maintain and expand the LessWrong website. Your day-to-day: While this role is targeting people with software engineering skills, we are actually seeking “specialized generalists”: engineers who have the flexibility and versatility to perform any work required for the success of an online forum, including “non-engineering” work. Your work will include most of the following: Developing front-end features; Fixing bugs according to priority; Improving and maintaining our backend; Having product strategy opinions [...]\"", "ex": "Junior (1-4 years experience)", "rt": "Software engineering", "po": "Full-time", "sa": "Minimum: $150,000", "lg": "https://80000hours.org/wp-content/uploads/2021/10/lightcone-infrastructure.png", "oj": "https://www.lightconeinfrastructure.com/index.html", "hi": true, "dp": "2021-10-12"}, {"id": 438, "t": "Technical Governance Researcher", "o": "Machine Intelligence Research Institute", "lk": "https://jobs.ashbyhq.com/miri/54142b55-b061-4f11-980e-73d9986ff1b9", "lo": "San Francisco Bay Area, USA", "cl": "Rolling", "ar": "1. AI safety & policy", "d": "* In this role, you'll research and design technical aspects of AI regulations to reduce existential risks from advanced AI.\n* Develop threat models identifying how AI systems could cause harm and propose preventative measures.\n* Evaluate AI models to demonstrate failure modes and limitations in current policy approaches.\n* Prepare briefings for policymakers on technical AI safety concepts and present findings to non-experts.\n* Design improved AI governance frameworks focusing particularly on risks from superintelligent systems.", "ex": "Junior (1-4 years experience),Mid (5-9 years experience)", "rt": "Research, Policy", "po": "Full-time", "sa": "$120,000 - $200,000", "lg": "https://cdn.80000hours.org/wp-content/uploads/2017/03/miri_logo2-150x150.png", "oj": "https://intelligence.org/careers/", "hi": true, "dp": "2025-11-12"}, {"id": 439, "t": "Researcher, Pretraining Safety", "o": "OpenAI", "lk": "https://openai.com/careers/researcher-pretraining-safety-san-francisco/", "lo": "San Francisco Bay Area, US loads/2025/03/forethought_org_logo.jpeg", "oj": "https://www.forethought.org/support", "hi": false, "dp": "2025-03-19"}, {"id": 513, "t": "General Applications", "o": "Future of Life Institute", "lk": "https://jobs.lever.co/futureof-life/2ad000b8-8c02-49a0-bbea-a588137665db", "lo": "Remote, Global", "cl": "Rolling", "ar": "1. AI safety & policy,Z. Climate change,3. Nuclear security,2. Biosecurity & pandemic preparedness", "d": "\"In the past couple of years, The Future of Life Institute has expanded rapidly, from only a small part-time team to a full-time staff of 20+ people. We have ambitions to continue growing our team, so we are always on the lookout for talented and proactive people who are aligned with our mission. If you match this description then please consider filling out our ‘Rolling applications’ form below, so that we can contact you in the event that a relevant career opportunity arises. Your details will only be used for the purpose of alerting you about relevant career opportunities. [...]\"", "ex": "Multiple experience levels", "rt": "Operations, Outreach, Policy, Research", "po": "Internship,Part-time", "sa": "Not Found", "lg": "https://80000hours.org/wp-content/uploads/2019/12/future-of-life.jpg", "oj": "https://futureoflife.org/job-postings/", "hi": false, "dp": "2022-05-12"}, {"id": 514, "t": "Senior Researcher", "o": "GiveWell", "lk": "https://job-boards.greenhouse.io/givewell/jobs/4253692008", "lo": "Remote, Global · San Francisco Bay Area, USA", "cl": "Rolling", "ar": "A. Global health & development", "d": "\"In this role, you will be responsible for finding, researching, and ultimately recommending high-impact or potentially high-impact giving opportunities. As part of a small team, you will be a significant contributor to our decisions about how hundreds of millions of dollars will be spent with the goal of saving and improving the lives of people living in the lowest-income communities in the world. You will be a leader on our research team, conducting research to help us identify outstanding programs to recommend.\"", "ex": "Mid (5-9 years experience)", "rt": "Research", "po": "Full-time,Part-time", "sa": "$200,000 - $220,600", "lg": "https://cdn.80000hours.org/wp-content/uploads/2017/03/GiveWell_square.jpg", "oj": "http://www.givewell.org/about/jobs", "hi": false, "dp": "2025-03-19"}, {"id": 515, "t": "Senior Malaria Researcher", "o": "GiveWell", "lk": "https://job-boards.greenhouse.io/givewell/jobs/4255140008", "lo": "Remote, Global · San Francisco Bay Area, USA", "cl": "Rolling", "ar": "A. Global health & development", "d": "\"GiveWell’s first Senior Malaria Researcher will be responsible for strengthening the quality of the research and cost-effectiveness modeling guiding GiveWell’s large portfolio of investments in malaria interventions. As the malaria subject-matter expert within this small team, you will be a significant contributor to our decisions about how hundreds of millions of dollars will be spent with the goal of saving and improving the lives of people living in the lowest-income communities in the world. We expect you to help address holistic questions about GiveWell’s portfolio of investments [...]\"", "ex": "Senior (10+ years experience)", "rt": "Research", "po": "Full-time,Part-time", "sa": "$200,000 - $220,600", "lg": "https://cdn.80000hours.org/wp-content/uploads/2017/03/GiveWell_square.jpg", "oj": "http://www.givewell.org/about/jobs", "hi": false, "dp": "2023-02-20"}, {"id": 516, "t": "Talent Pool", "o": "GiveWell", "lk": "https://job-boards.greenhouse.io/givewell/jobs/4053379008?gh_src=28dfee808us", "lo": "USA · Various, Global", "cl": "Rolling", "ar": "A. Global health & development", "d": "- GiveWell aims to keep in touch with the talent pool to share important updates and may reach out if they open a role that seems like a good fit.", "ex": "Multiple experience levels", "rt": "Operations, Outreach, Research", "po": "Full-time", "sa": "Not Found", "lg": "https://cdn.80000hours.org/wp-content/uploads/2017/03/GiveWell_square.jpg", "oj": "http://www.givewell.org/about/jobs", "hi": false, "dp": "2024-10-07"}, {"id": 517, "t": "Founders For New Effective Giving Organisations (Expression of Interest)", "o": "Giving What We Can", "lk": "https://www.givingwhatwecan.org/seeking-founders-for-new-effective-giving-organisations", "lo": "Remote, Global · Various, Global", "cl": "Rolling", "ar": "5. Building effective altruism", "d": "\"Giving What We Can is looking to help founding teams organise to grow effective giving around the world and wants to hear from people excited about helping new effective giving initiatives get off the ground. These are likely to be initiatives in new geographies, like Effektiv Spenden, but we are also open to hearing about ideas for projects seeking to promote effective giving to specific interest groups, like High Impact Athletes. At this point we will prioritise supporting organisations which will fundraise for GWWC’s existing recommendations [...]\"", "ex": "Multiple experience levels", "rt": "Operations, Legal, Outreach", "po": "Full-time", "sa": "Not Found", "lg": "https://80000hours.org/wp-content/uploads/2023/01/Giving-What-We-Can.png", "oj": "https://www.givingwhatwecan.org/get-involved/careers/", "hi": false, "dp": "2023-08-02"}, {"id": 518, "t": "General Application", "o": "Giving What We Can", "lk": "https://airtable.com/appYQIIq3t2Hrq16O/shrW3a9lNXGtFqGpv", "lo": "Remote, Global", "cl": "Rolling", "ar": "5. Building effective altruism", "d": "\"We are currently accepting general expressions of interest if you want to work with Giving What We Can but we don't have a suitable role advertised yet. Expressions of interest and general applications are reviewed on a rolling basis. We will reach out if we think you might be a good fit or a role comes up that suits your skillset.\"", "ex": "Multiple experience levels", "rt": "Operations, Software engineering, Policy, Management, Research, Finance", "po": "Full-time", "sa": "Not Found", "lg": "https://80000hours.org/wp-content/uploads/2023/01/Giving-What-We-Can.png", "oj": "https://www.givingwhatwecan.org/get-involved/careers/", "hi": false, "dp": "2023-11-07"}, {"id": 519, "t": "Head of Marketing", "o": "Giving What We Can", "lk": "https://www.givingwhatwecan.org/head-of-marketing", "lo": "Remote, Global", "cl": "Rolling", "ar": "5. Building effective altruism", "d": "* In this role, you'll lead marketing to scale donations to high-impact charities by creating compelling campaigns that inspire audiences beyond Giving What We Can's current community.\n* Create campaigns and content across email, social, website, and paid channels that drive action.\n* Build your marketing team, bringing in specialist freelancers and hires to support growth.\n* Develop systems and playbooks that enable marketing to compound and scale over time.\n* Shape Giving What We Can's brand identity, raising design and creative quality across all touchpoints.", "ex": "Multiple experience levels", "rt": "Outreach", "po": "Full-time", "sa": "$50,000 - $140,000", "lg": "https://80000hours.org/wp-content/uploads/2023/01/Giving-What-We-Can.png", "oj": "https://www.givingwhatwecan.org/get-involved/careers/", "hi": false, "dp": "2026-02-27"}, {"id": 520, "t": "Postdoc, Mechanism Design for Robust AI Alignment", "o": "King's College London, Department of Informatics", "lk": "https://www.linkedin.com/posts/carmine-ventre-35388622_aisafety-aialignment-mechanismdesign-activity-7421947981307756544-e69Y/", "lo": "London, UK", "cl": "Rolling", "ar": "1. AI safety & policy", "d": "* In this role, you'll conduct research on mechanism design approaches for aligning advanced AI systems.\n* Develop theoretical foundations for understanding AI behavior when agents have evolving capabilities.\n* Apply concepts from game theory and mechanism design to AI alignment challenges.\n* Collaborate with researchers at King's College London and the UK AI Security Institute.\n* Explore solution concepts beyond dominant strategies and incentive compatibility for robust AI alignment.", "ex": "Entry-level,Junior (1-4 years experience)", "rt": "Research", "po": "Full-time", "sa": "Not Found", "lg": "https://80000hours.org/wp-content/uploads/2020/02/kings-college-london.jpg", "oj": "https://my.corehr.com/pls/kingrecruit/erq_search_package.search_form?p_company=1&p_internal_external=E", "hi": false, "dp": "2026-02-05"}, {"id": 521, "t": "General Applications", "o": "Longview Philanthropy", "lk": "https://www.longview.org/careers/general-applications/", "lo": "London, UK · Remote, Global", "cl": "Rolling", "ar": "4. Macrostrategy,5. Building effective altruism", "d": "\"If you are interested in working at Longview Philanthropy but don't see a role that suits you, please complete the form below. Please upload your CV or any other supporting documents and include any relevant past experience.\"", "ex": "Multiple experience levels", "rt": "Research, Policy, Operations, Strategy", "po": "Full-time", "sa": "Not Found", "lg": "https://80000hours.org/wp-content/uploads/2021/02/longview-philanthropy.jpeg", "oj": "https://www.longview.org/careers", "hi": true, "dp": "2023-09-19"}, {"id": 522, "t": "Community and Operations Coordinator / Manager", "o": "Meridian", "lk": "https://www.meridiancambridge.org/community-ops-coordinator", "lo": "Cambridge, UK", "cl": "Rolling", "ar": "1. AI safety & policy", "d": "* In this role, you'll manage Meridian's workspace and coordinate logistics across AI safety research programs in Cambridge.\n* Oversee research program operations including visitor logistics, events, catering, and travel arrangements.\n* Manage workspace facilities, supplies, vendors, and daily operations with autonomy to improve the environment.\n* Organize workshops, journal clubs, and community events for AI safety and biosecurity researchers.\n* Welcome new researchers, run orientations, and build relationships across research networks.", "ex": "Entry-level,Junior (1-4 years experience)", "rt": "Operations", "po": "Full-time", "sa": "£40,000 - £55,000", "lg": "https://80000hours.org/wp-content/uploads/2025/06/meridian_cambridge_logo.jpg", "oj": "https://www.meridiancambridge.org/careers", "hi": false, "dp": "2025-12-02"}, {"id": 523, "t": "Audit Expert (Pro Bono)", "o": "New Incentives", "lk": "https://docs.google.com/document/d/1_l46VONWJMmmIvZbTw7TaYbWE9N_Yx54mjkASkYFBzA/edit", "lo": "Remote, Global", "cl": "Rolling", "ar": "A. Global health & development", "d": "\"Responsibilities of New Incentives Audit Expert: Reviews US and Nigerian audit reports. Reviews compliance with relevant laws and tax regulations. Review the organization’s accounting policies. Keeps informed of legal, regulatory and sector developments relating to the organization’s audit responsibilities.\"", "ex": "Mid (5-9 years experience)", "rt": "Finance", "po": "Part-time", "sa": "Not Found", "lg": "https://80000hours.org/wp-content/uploads/2022/12/New-Incentives.png", "oj": "https://new-incentives.breezy.hr/", "hi": false, "dp": "2023-03-02"}, {"id": 524, "t": "Young Scientist / Young Researcher, Large-Scale Model Attack and Defense", "o": "Shanghai Artificial Intelligence Laboratory", "lk": "https://www.shlab.org.cn/joinus/detail/7562520187132643647", "lo": "Shanghai, China", "cl": "Rolling", "ar": "1. AI safety & policy", "d": "* In this role, you'll research and develop attack and defense techniques for large AI models throughout their lifecycle.\n* Conduct cutting-edge research on attack methods like prompt injection, adversarial examples, and backdoor attacks.\n* Build automated testing frameworks to systematically assess model security, robustness, and privacy.\n* Design innovative defense strategies including input filtering, anomaly detection, and parameter fine-tuning.\n* Develop secure inference architectures based on cloud-edge-device collaborative deployment.", "ex": "Entry-level,Junior (1-4 years experience)", "rt": "Research, Information security, Software engineering", "po": "Full-time", "sa": "Not Found", "lg": "https://80000hours.org/wp-content/uploads/2025/04/shanghai_ai_lab_logo.jpeg", "oj": "https://www.shlab.org.cn/joinus/", "hi": false, "dp": "2025-11-25"}, {"id": 525, "t": "SciTech Manager", "o": "The Good Food Institute", "lk": "https://gfi.org/resource/scitech-manager/", "lo": "Beijing, China", "cl": "28/6/2026", "ar": "B. Animal welfare", "d": "* In this role, you'll serve as GFI APAC's scientific lead on alternative proteins, providing insight into R&D trends and emerging technologies.\n* Support regional expansion by providing scientific expertise in key stakeholder meetings.\n* Monitor developments across the alternative protein ecosystem and share insights with global teams.\n* Build relationships with researchers and technical stakeholders to strengthen information flow.\n* Synthesize research trends into concise briefings for cross-functional teams.", "ex": "Mid (5-9 years experience)", "rt": "Research, Strategy", "po": "Full-time", "sa": "¥540,000 - ¥720,000", "lg": "https://80000hours.org/wp-content/uploads/2021/05/good-food-institute.png", "oj": "https://www.gfi.org/jobs", "hi": false, "dp": "2026-02-04"}, {"id": 526, "t": "Postdocs / Research Staff / Staff Programmers / Interns", "o": "University of California, Berkeley, Department of Electrical Engineering and Computer Sciences", "lk": "https://dawnsong.io/", "lo": "San Francisco Bay Area, USA", "cl": "Rolling", "ar": "1. AI safety & policy", "d": "* In these roles, you'll join Professor Dawn Song's research team at UC Berkeley, working on AI safety, security, or deep learning projects.\n* Dawn Song's research interests include AI safety and security, agentic AI, deep learning, decentralization technology, and security and privacy.", "ex": "Entry-level,Junior (1-4 years experience)", "rt": "Research, Software engineering", "po": "Full-time,Internship", "sa": "Not Found", "lg": "https://80000hours.org/wp-content/uploads/2023/01/University-of-California-Berkeley.png", "oj": "https://eecs.berkeley.edu/connect/faculty-jobs/", "hi": false, "dp": "2025-10-16"}, {"id": 527, "t": "Software Engineer", "o": "Valthos", "lk": "https://jobs.ashbyhq.com/valthos/58637d53-f949-49fa-b318-88a93635337b", "lo": "New York · NY, USA", "cl": "Rolling", "ar": "2. Biosecurity & pandemic preparedness,1. AI safety & policy", "d": "* In this role, you'll design and implement a platform that brings frontier computational biology methods to scientific and technical end users.\n* Build high-scale, data/GPU intensive APIs in collaboration with AI Engineers and Computational Biologists.\n* Develop interactive workflow UIs and data visualization tools for life-science users.\n* Create distributed systems that efficiently process large-scale user data using both CPUs and GPUs.\n* Maintain secure cloud infrastructure for scaling storage, compute, and search systems.", "ex": "Mid (5-9 years experience)", "rt": "Software engineering", "po": "Full-time", "sa": "Not Found", "lg": "https://80000hours.org/wp-content/uploads/2025/10/valthos_logo.jpeg", "oj": "https://jobs.ashbyhq.com/valthos", "hi": false, "dp": "2025-10-28"}, {"id": 528, "t": "Expression of Interest, Contract Video Editor, Podcast", "o": "80,000 Hours", "lk": "https://80000hours.org/2026/02/expression-of-interest-contract-video-editor-for-the-podcast-team/", "lo": "London, UK", "cl": "Rolling", "ar": "1. AI safety & policy", "d": "* In this role, you'll edit long-form podcast episodes to a high standard using DaVinci Resolve.\n* Clean and balance audio to ensure consistent quality across episodes.\n* Implement editorial and technical cuts to improve pacing while maintaining content depth.\n* Deliver polished edited files to deadline and flag issues early.", "ex": "Junior (1-4 years experience)", "rt": "Other", "po": "Full-time", "sa": "$40 - $74 per hour", "lg": "https://80000hours.org/wp-content/uploads/2019/11/80k-logo-Square-white-blue.jpg", "oj": "https://80000hours.org/about/work-with-us/", "hi": true, "dp": "2026-02-27"}, {"id": 529, "t": "Volunteer", "o": "AI Alignment Network", "lk": "https://www.aialign.net/recruit", "lo": "Japan", "cl": "Rolling", "ar": "1. AI safety & policy", "d": "- ALIGN seeks volunteer staff to help grow the community and support ALIGN’s mission of creating a hopeful future for AI and humanity. \n- Plan and manage webinars, study sessions, and symposiums. \n- Support online and offline community activities. \n- Assist with social media management and newsletter creation. \n- Research and write reports on events, and assist with report writing.", "ex": "Entry-level", "rt": "Operations, Outreach", "po": "Volunteering", "sa": "Not Found", "lg": "https://80000hours.org/wp-content/uploads/2024/10/ai_alignment_network_logo.jpg", "oj": "https://www.aialign.net/recruit", "hi": false, "dp": "2024-10-29"}, {"id": 530, "t": "Volunteer", "o": "AI Safety Awareness Project", "lk": "https://docs.google.com/document/d/1lEtqNXTuFz-_b5G9Hbp5JooOY8bY0PEVedjMSLwlx6I/edit?tab=t.0", "lo": "Global", "cl": "Rolling", "ar": "1. AI safety & policy", "d": "'- Facilitate local workshops using provided materials to guide balanced discussions.\n- Adapt content for specific community needs (technical, economic, artistic).\n- Organise venues, advertising and logistics for local AI Safety Workshops.\n- Establish partnerships with schools, libraries and community groups.\n- Participate in workshops to build public awareness about AI risks and benefits.", "ex": "Entry-level", "rt": "Operations", "po": "Volunteering", "sa": "Not Found", "lg": "https://80000hours.org/wp-content/uploads/2025/03/aisaf_logo.avif", "oj": "", "hi": false, "dp": "2025-03-12"}, {"id": 531, "t": "Volunteer", "o": "AIGS Canada", "lk": "https://aigs.ca/volunteer/", "lo": "Remote, Canada", "cl": "Rolling", "ar": "1. AI safety & policy", "d": "* In this role, you'll volunteer with AIGS to help ensure advanced AI systems in Canada are developed safely and beneficially.\n* Address risks from emerging smarter-than-human AI through community collaboration and advocacy.\n* Choose your commitment level, from occasional Explorer to regular Supporter to core Team Leader.\n* Join specialized teams focusing on Advocacy, Events, Analysis, Communications, or Policy initiatives.\n* Help shape responsible AI governance while developing expertise in this critical emerging field.", "ex": "Entry-level", "rt": "Policy, Outreach, Operations", "po": "Volunteering", "sa": "Not Found", "lg": "https://80000hours.org/wp-content/uploads/2023/05/AIGS.png", "oj": "", "hi": false, "dp": "2025-11-20"}, {"id": 532, "t": "Volunteer Opportunities", "o": "AISafety.com", "lk": "https://www.aisafety.com/projects", "lo": "Remote, Global", "cl": "Rolling", "ar": "1. AI safety & policy", "d": "- Opportunities to volunteer with various AI safety projects.\n- Page includes active projects and project ideas.", "ex": "Entry-level", "rt": "Operations, Outreach, Research", "po": "Volunteering", "sa": "Not Found", "lg": "https://80000hours.org/wp-content/uploads/2024/08/AISafety.com_Logo.png", "oj": "", "hi": false, "dp": "2024-08-01"}, {"id": 533, "t": "Intern, Responsible AI", "o": "ALLAI", "lk": "https://allai.nl/apply-for-an-internship-at-allai-2/", "lo": "Netherlands", "cl": "Rolling", "ar": "1. AI safety & policy", "d": "\"We are looking for interns to help advance Responsible AI – AI that is lawful, ethical and socio-technically robust. We work on different projects in multiple domains, such as (inter)national AI policy and regulation, research and innovation on responsible AI and awareness building and education. What we offer: We offer an interdisciplinary, international environment where you get to work with the top experts in the field of AI, data science, ethics and regulation. You will engage with academics, policy makers, companies, the public sector [...]\"", "ex": "Entry-level", "rt": "Research", "po": "Internship", "sa": "Not Found", ps://80000hours.org/wp-content/uploads/2024/05/northeastern_university_logo.png", "oj": "https://ndif.us/start.html#jobs", "hi": false, "dp": "2024-07-10"}, {"id": 659, "t": "AI Reporting Grants", "o": "Pulitzer Center", "lk": "https://pulitzercenter.org/grants-fellowships/opportunities-journalists/ai-reporting-grants", "lo": "Remote, Global", "cl": "Rolling", "ar": "1. AI safety & policy", "d": "\"We welcome in-depth stories that explore with nuance how AI systems are designed, sold and deployed in communities around the world. We value reporting that centers on the people that are directly impacted by automated systems, as well as solutions-oriented stories. We encourage applications for all formats of reporting and also on lesser reported topics, including: AI industry supply chains; Procurement processes for algorithmic and surveillance systems; Environmental impacts of AI; AI & disinformation networks; AI warfare; AI transparency [...]\"", "ex": "Multiple experience levels", "rt": "Other", "po": "Funding", "sa": "Not Found", "lg": "https://80000hours.org/wp-content/uploads/2024/01/pulitzer_center_logo.jpeg", "oj": "https://pulitzercenter.org/about/employment-opportunities", "hi": true, "dp": "2024-01-08"}, {"id": 660, "t": "Research Lead, AI Cyber Testing", "o": "RAND Corporation", "lk": "https://rand.wd5.myworkdayjobs.com/en-US/External_Career_Site/job/Washington-DC-DC-Metro-Area/Research-Lead----AI-Cyber-Testing---Evaluation_R3122", "lo": "Los Angeles · CA, USA", "cl": "Rolling", "ar": "1. AI safety & policy", "d": "* In this role, you'll lead RAND's AI cyber evaluation agenda, assessing offensive cyber capabilities of frontier AI models.\n* Manage research budgets and personnel, overseeing technical research and policy analysis projects.\n* Lead multidisciplinary teams developing benchmarks for AI model performance across the full attack lifecycle.\n* Communicate findings through technical analyses and policy briefs for government agencies and industry leaders.\n* Shape recommendations for the White House, regulatory agencies, intelligence community, and national governments.", "ex": "Mid (5-9 years experience)", "rt": "Research, Software engineering, Information security", "po": "Full-time", "sa": "$137,000 - $246,600", "lg": "https://80000hours.org/wp-content/uploads/2018/11/Rand-corporation.png", "oj": "https://rand.wd5.myworkdayjobs.com/External_Career_Site/", "hi": true, "dp": "2025-03-17"}, {"id": 661, "t": "Senior Research Lead, AI Security Portfolio", "o": "RAND Corporation", "lk": "https://rand.wd5.myworkdayjobs.com/en-US/External_Career_Site/job/San-Francisco-CA/Senior-Research-Lead---AI-Security-Portfolio_R3464-1", "lo": "Remote, USA · Various, USA", "cl": "Rolling", "ar": "1. AI safety & policy", "d": "* In this role, you'll lead RAND's research portfolio focused on securing advanced AI systems, understanding cyber capabilities, and shaping policy frameworks.\n* Define and drive research agenda on secure AI systems across multiple teams and programs.\n* Lead complex projects integrating technical R&D, cybersecurity operations, and policy analysis.\n* Mentor and manage senior technical staff and researchers across a portfolio of 15-30 people.\n* Engage with senior government and industry stakeholders to ensure research informs high-level decisions.", "ex": "Mid (5-9 years experience),Senior (10+ years experience)", "rt": "Research, Strategy, Management, Information security", "po": "Full-time", "sa": "$167,300 - $261,400", "lg": "https://80000hours.org/wp-content/uploads/2018/11/Rand-corporation.png", "oj": "https://rand.wd5.myworkdayjobs.com/External_Career_Site/", "hi": true, "dp": "2026-02-18"}, {"id": 662, "t": "Artificial Intelligence Safety Standards Expert", "o": "Shanghai Artificial Intelligence Laboratory", "lk": "https://www.shlab.org.cn/joinus/detail/7599507253209090346?mode=social&keyword=&jobFunction=&jobType=&location=&subject=", "lo": "Shanghai, China", "cl": "Rolling", "ar": "1. AI safety & policy", "d": "* In this role, you'll lead AI security standards development focusing on ISO/IEC international standards.\n* Develop proposal materials for new AI security standards through technical research.\n* Build the AISMM standards network through industry partnerships and collaboration.\n* Manage AISMM platform operations to ensure professional content and user satisfaction.\n* Organize industry events to foster collaboration among network members.", "ex": "Mid (5-9 years experience)", "rt": "Policy", "po": "Full-time", "sa": "Not Found", "lg": "https://80000hours.org/wp-content/uploads/2025/04/shanghai_ai_lab_logo.jpeg", "oj": "https://www.shlab.org.cn/joinus/", "hi": false, "dp": "2026-01-30"}, {"id": 663, "t": "Director, Donor Relations", "o": "The AI Policy Network", "lk": "https://theaipn.org/careers/director-donor-relations/", "lo": "San Francisco Bay Area, USA", "cl": "Rolling", "ar": "1. AI safety & policy", "d": "* In this role, you'll cultivate and close major gifts from tech professionals and mission-aligned donors to support AIPN's work.\n* Manage a portfolio of 75–150 individual donors, focusing on gifts of $10,000–$500,000 and stewardship.\n* Plan and execute donor cultivation events including policy briefings, salons, and roundtables across the Bay Area.\n* Develop tailored gift proposals, engagement plans, and reports that articulate AIPN's mission to donor audiences.\n* Build relationships within Bay Area tech, AI safety, and philanthropic communities to identify prospective major donors.", "ex": "Mid (5-9 years experience)", "rt": "Outreach", "po": "Full-time", "sa": "$130,000 - $165,000", "lg": "https://80000hours.org/wp-content/uploads/2026/03/ai_policy_network_logo.jpeg", "oj": "https://theaipn.org/careers/", "hi": false, "dp": "2026-03-05"}, {"id": 664, "t": "Vice President, Government Affairs, Senate Focus", "o": "The AI Policy Network", "lk": "https://theaipn.org/careers/vice-president-of-government-affairs-senate-focus/", "lo": "Washington · DC metro area, USA", "cl": "Rolling", "ar": "1. AI safety & policy", "d": "* In this role, you'll translate AIPN's AI safety and national security policy into Senate legislation through strategic engagement and coalition building.\n* Build and maintain relationships with Senate leadership, committee chairs, and key staff across relevant committees.\n* Develop and execute Senate-specific legislative strategies around AI safety, AGI preparedness, and national security.\n* Draft bill language, amendments, testimony, and policy materials tailored to Senate audiences.\n* Coordinate bicameral legislative strategy and identify opportunities to advance AIPN's policy priorities.", "ex": "Mid (5-9 years experience),Senior (10+ years experience)", "rt": "Policy, Strategy", "po": "Full-time", "sa": "$190,000 - $260,000", "lg": "https://80000hours.org/wp-content/uploads/2026/03/ai_policy_network_logo.jpeg", "oj": "https://theaipn.org/careers/", "hi": false, "dp": "2026-03-05"}, {"id": 665, "t": "Senior Writer", "o": "The Deep View", "lk": "https://jobs.ashbyhq.com/tdv/4aa51878-d68a-4b09-a007-9c311ccf3271?trk=feed_main-feed-card_feed-article-content", "lo": "New York · NY, USA", "cl": "Rolling", "ar": "1. AI safety & policy", "d": "* In this role, you'll track AI's biggest developments, curate must-know stories, and break down what matters most for a leading AI media brand.\n* Write and deliver a sharp, engaging daily newsletter that keeps readers informed about AI developments.\n* Sift through AI news to identify truly important stories, providing original analysis that differentiates our coverage.\n* Develop distinctive areas of expertise and become a go-to expert on specific AI beats.\n* Test and review AI tools to help readers distinguish between valuable products and overhyped offerings.", "ex": "Mid (5-9 years experience)", "rt": "Other", "po": "Full-time", "sa": "Not Found", "lg": "https://80000hours.org/wp-content/uploads/2025/04/deep_view_logo.avif", "oj": "", "h tz_ai-nerds-come-support-my-team-at-nist-on-activity-7240864161662930945-WN-M/", "lo": "Washington · DC metro area, USA", "cl": "Rolling", "ar": "1. AI safety & policy", "d": "- GBS Solutions is looking to hire a contractor to support NIST—specifically the NIST AI Innovation Lab—in several key tasks related to AI standards.\n- Provide support on strategy, prioritisation, planning, logistics, relationship management, and communication regarding global engagement on AI standards under Executive Order 14110.\n- Provide research support to NIST in its role to develop and advance collaborative frameworks, standards, guidelines, and associated methods and techniques for artificial intelligence.", "ex": "Mid (5-9 years experience)", "rt": "Research, Policy, Strategy", "po": "Full-time", "sa": "Not Found", "lg": "https://80000hours.org/wp-content/uploads/2019/06/national-institute-of-standards-and-technology.png", "oj": "https://www.usajobs.gov/", "hi": false, "dp": "2024-09-20"}, {"id": 669, "t": "Research Associate", "o": "Claryx", "lk": "https://static1.squarespace.com/static/68924fd1cb448a62bf39f107/t/694360a7be6fc705faf20292/1766023335818/Claryx+-+Research+Associate+Job+Description+%28Dec-25%29_vF.pdf", "lo": "New York · NY, USA", "cl": "Rolling", "ar": "2. Biosecurity & pandemic preparedness", "d": "* In this role, you'll execute molecular workflows to detect pathogens from environmental samples for Claryx's biosurveillance platform.\n* Process environmental samples and perform nucleic-acid extraction with strict quality control protocols.\n* Execute multiplex qPCR/RT-qPCR assays for detecting priority pathogens and antimicrobial resistance.\n* Prepare metagenomic libraries with targeted enrichment and run Illumina sequencing.\n* Maintain BSL-2 laboratory standards and track inventories while contributing to SOP improvements.", "ex": "Junior (1-4 years experience),Mid (5-9 years experience)", "rt": "Research", "po": "Full-time", "sa": "$75,000 - $85,000", "lg": "https://80000hours.org/wp-content/uploads/2026/01/claryx_logo.jpg", "oj": "https://www.claryx.com/careers", "hi": false, "dp": "2026-01-06"}, {"id": 670, "t": "Computational Biologist", "o": "Claryx", "lk": "https://static1.squarespace.com/static/68924fd1cb448a62bf39f107/t/69436142fb12c57bdafe518c/1766023490793/Claryx+-+Computational+Biologist+Job+Description+%28Dec-25%29_vF.pdf", "lo": "New York · NY, USA", "cl": "Rolling", "ar": "2. Biosecurity & pandemic preparedness", "d": "* In this role, you'll build and maintain bioinformatics pipelines and data infrastructure for a hospital pathogen biosurveillance platform.\n* Design metagenomic analysis workflows for taxonomic profiling and antimicrobial resistance detection.\n* Build predictive models from genomic data and create dashboards for communicating results.\n* Deploy containerized workflows on AWS using workflow managers to ensure reproducibility.\n* Implement HIPAA/SOC 2 compliant security protocols including audit logging and encryption.", "ex": "Junior (1-4 years experience),Mid (5-9 years experience)", "rt": "Software engineering", "po": "Full-time", "sa": "$90,000 - $110,000", "lg": "https://80000hours.org/wp-content/uploads/2026/01/claryx_logo.jpg", "oj": "https://www.claryx.com/careers", "hi": false, "dp": "2026-01-06"}, {"id": 671, "t": "Computational Biologist", "o": "Massachusetts Institute of Technology, Lincoln Laboratory", "lk": "https://careers.ll.mit.edu/job/Lexington-Computational-Biologist-MA-02420/1366997300/", "lo": "Boston metro area, USA", "cl": "Rolling", "ar": "2. Biosecurity & pandemic preparedness", "d": "* In this role, you'll support research and development efforts focused on national security challenges in biodefense and counter-WMD systems.\n* Lead projects analysing complex biological datasets including next-generation sequencing and metagenomic data.\n* Apply computational tools and machine learning models to biological questions in multiomics, immunology, and microbiome research.\n* Design laboratory experiments to generate and validate biological data.\n* Collaborate with multidisciplinary teams to solve challenging problems in biodefense.", "ex": "Junior (1-4 years experience)", "rt": "Research, Software engineering", "po": "Full-time", "sa": "$145,200 - $220,000", "lg": "https://80000hours.org/wp-content/uploads/2023/12/MIT-Lincoln-Laboratory.jpeg", "oj": "https://www.ll.mit.edu/careers", "hi": false, "dp": "2026-02-24"}, {"id": 672, "t": "Assistant Professor / Associate Professor / Professor", "o": "National University of Singapore, Asia Centre for Health Security", "lk": "https://sph.nus.edu.sg/about/careers/", "lo": "Singapore, Singapore", "cl": "Rolling", "ar": "2. Biosecurity & pandemic preparedness", "d": "- The Saw Swee Hock School of Public Health, National University of Singapore, is inviting applications for full-time Assistant Professor/Associate Professor/Professor appointments on the tenure/research/practice track.\n- Focus areas include Epidemiology and Modelling, Health Security, Health Systems and Policy.\n- Establish an independent research agenda through securing extramural funding.\n- Develop and participate in collaborative, multidisciplinary research initiatives.\n- Design and teach undergraduate and graduate courses in public health.\n- Supervise and advise postgraduate students.", "ex": "Junior (1-4 years experience),Mid (5-9 years experience)", "rt": "Research, Other", "po": "Full-time", "sa": "Not Found", "lg": "https://80000hours.org/wp-content/uploads/2023/05/National-University-of-Singapore.jpeg", "oj": "https://careers.nus.edu.sg/NUS/go/Academic-and-Research-Positions/545744/", "hi": false, "dp": "2024-09-26"}, {"id": 673, "t": "Research Fellow, Infectious Disease Modelling", "o": "National University of Singapore, Asia Centre for Health Security", "lk": "https://careers.nus.edu.sg/job/Research-Fellow-%28Infectious-Disease-Modelling%29/30141-en_GB/", "lo": "Singapore, Singapore", "cl": "Rolling", "ar": "2. Biosecurity & pandemic preparedness,A. Global health & development", "d": "* In this role, you'll lead research developing within-host mathematical models to understand long-term dynamics of immunity to pathogens.\n* Develop mathematical models to test hypotheses on durability of acquired immunity through infection, vaccination or hybrid immunity.\n* Collaborate with interdisciplinary teams across Singapore, Vietnam, Cambodia and the UK.\n* Analyze data from longitudinal studies tracking immune responses to infection/vaccination.\n* Disseminate research findings through peer-reviewed publications and presentations at international conferences.", "ex": "Junior (1-4 years experience)", "rt": "Research", "po": "Fellowship", "sa": "Not Found", "lg": "https://80000hours.org/wp-content/uploads/2023/05/National-University-of-Singapore.jpeg", "oj": "https://careers.nus.edu.sg/NUS/go/Academic-and-Research-Positions/545744/", "hi": false, "dp": "2025-09-08"}, {"id": 674, "t": "Research Associate, Law and Governance, Biosecurity and Global Health", "o": "National University of Singapore, Asia Centre for Health Security", "lk": "https://careers.nus.edu.sg/job/Research-Associate-%28Law-and-Governance%2C-Biosecurity-and-Global-Health%29/30430-en_GB/", "lo": "Singapore, Singapore", "cl": "Rolling", "ar": "2. Biosecurity & pandemic preparedness", "d": "* In this role, you'll support the Law and Governance Program at the Asia Centre for Health Security, focusing on biosecurity and global health in Asia.\n* Conduct research on law and governance aspects of biosecurity and public health.\n* Write reports and publications to advance health security initiatives in Asia.\n* Support program activities including organizing and facilitating events.\n* Work independently under supervision while collaborating with Centre members and stakeholders from diverse backgrounds.", "ex": "Junior (1-4 years experience)", "rt": "Research, Policy", "po": "Full-time", "sa": "Not Found", "lg": "https://80000hours.org/wp-content/uploads/2023/05/National-University-of-Singapore.jpeg", "oj": "https://careers.nus.edu.sg/NUS/go/Academic-and-Research-Positions/545744/", "hi": false, "dp": "2025-09-24"}, {"id": 675, "t": "Research Fellow", "o": "National University of Singapore, Saw Swee Hock School of Public Health", "lk": "https://careers.nus.edu.sg/job/Research-Fellow-%28NUS-Advance-ID%29/29117-en_GB/", "lo": "Singapore, Singapore", "cl": "Rolling", "ar": "A. Global health & development,2. Biosecurity & pandemic preparedness", "d": "* In this role, you'll serve as a biostatistician for the ADVANCE-ID Network, developing clinical evidence for drug-resistant infections.\n* Develop statistical analysis plans, study protocols, and provide input for case report forms.\n* Perform complex statistical analyses, simulations, and create automated processes with minimal oversight.\n* Contribute to trial designs supporting regulatory approval and market access.\n* Collaborate across disciplines and provide statistical consultation for ad hoc analysis requests.", "ex": "Junior (1-4 years experience)", "rt": "Research", "po": "Fellowship", "sa": "Not Found", "lg": "https://80000hours.org/wp-content/uploads/2023/05/National-University-of-Singapore.jpeg", "oj": "https://careers.nus.edu.sg/NUS/go/Academic-and-Research-Positions/545744/", "hi": false, "dp": "2025-06-03"}, {"id": 676, "t": "Field Sampler", "o": "SecureBio", "lk": "https://securebio.org/careers/2025-field-sampler", "lo": "Boston metro area, USA", "cl": "Rolling", "ar": "2. Biosecurity & pandemic preparedness", "d": "* In this role, you'll collect biological samples from the public to support early detection of emerging pathogens.\n* Approach members of the public at Boston locations, explaining the study and inviting participation.\n* Follow biosafety protocols while handling and transporting collected samples.\n* Deliver samples to the lab twice during your shift according to the established schedule.\n* Represent the Nucleic Acid Observatory professionally while engaging with the public.", "ex": "Entry-level", "rt": "Outreach", "po": "Part-time", "sa": "$16 per hour, $0.20 per swab collected", "lg": "https://80000hours.org/wp-content/uploads/2023/05/SecureBio-1.png", "oj": "https://securebio.org/careers/", "hi": true, "dp": "2025-05-02"}, {"id": 677, "t": "Plant Biology / Pathology Methods Consultants", "o": "SecureBio", "lk": "https://securebio.org/careers/plant-biology--pathology-methods-consultants-part-time", "lo": "Remote, Global", "cl": "Rolling", "ar": "2. Biosecurity & pandemic preparedness", "d": "* In this role, you'll assess whether AI assistants can provide useful assistance in plant molecular biology and plant pathology lab work.\n* Evaluate the accuracy of AI assistants in lab troubleshooting tasks.\n* Collaborate with a team of full-time biologists on this research project.\n* Provide expertise based on your hands-on lab and/or field experience with plant pathogens.\n* Work remotely on an asynchronous schedule, compensated on a per-task basis.", "ex": "Entry-level", "rt": "Research", "po": "Part-time", "sa": "$80 - $150 per hour", "lg": "https://80000hours.org/wp-content/uploads/2023/05/SecureBio-1.png", "oj": "https://securebio.org/careers/", "hi": true, "dp": "2025-05-23"}, {"id": 678, "t": "Engineering PhD student (with Dr. David Denkenberger, ALLFED)", "o": "University of Canterbury", "lk": "https://eahire.notion.site/eahire/Multiple-high-impact-PhD-student-positions-4f539332738a49cc8915aaa8731f9a3e", "lo": "Christchurch, New Zealand", "cl": "Rolling", "ar": "3. Nuclear security,2. Biosecurity & pandemic preparedness", "d": "\"This is a great opportunity to do a PhD at University of Canterbury (Christchurch, New Zealand) in mechanical engineering under the supervision of Dr. David Denkenberger Director & Co-founder of ALLFED. There is no coursework, so you can focus on effective research that is related to engineering. Possible topics related to global catastrophic risks ic, diagnostic, and epidemiological datasets.\n* Design and implement robust CI/CD pipelines with automated testing as mandatory deployment gates.\n* Lead technical design reviews and support production systems including on-call monitoring and troubleshooting.", "ex": "Mid (5-9 years experience)", "rt": "Software engineering", "po": "Full-time", "sa": "Base: $134,300 - $189,900", "lg": "https://80000hours.org/wp-content/uploads/2022/11/Ginkgo-bioworks.png", "oj": "https://www.ginkgobioworks.com/careers/", "hi": false, "dp": "2026-02-20"}, {"id": 683, "t": "Expression of Interest", "o": "Mirror Biology Dialogues Fund", "lk": "https://www.mbdialogues.org/jobs#:~:text=Expressions%20of%20interest", "lo": "Remote, Global", "cl": "Rolling", "ar": "2. Biosecurity & pandemic preparedness", "d": "* Express interest in future roles with the Mirror Biology Dialogues Fund.\n* Science Roles: Lead technical projects on mirror-life feasibility and risks, collaborate with experts to design scientific workshops, and translate complex findings into clear actionable communications for various stakeholders.\n* Policy Roles: Engage with policymakers to help them understand and address the risks of mirror life.\n* Operations Roles: Help the MBDF team grow, run smoothly, and accomplish its goals.  \n* General Interest: Express interest in any other roles.", "ex": "Multiple experience levels", "rt": "Research, Operations", "po": "Full-time", "sa": "Not Found", "lg": "https://80000hours.org/wp-content/uploads/2025/04/mirror_biology_dialogues_fund_logo.png", "oj": "https://www.mbdialogues.org/jobs/", "hi": false, "dp": "2026-01-12"}, {"id": 684, "t": "Expression of Interest", "o": "SecureBio", "lk": "https://securebio.org/careers/general-application", "lo": "Boston metro area, USA", "cl": "Rolling", "ar": "2. Biosecurity & pandemic preparedness", "d": "* Express interest in SecureBio reaching out to you for potential roles.", "ex": "Multiple experience levels", "rt": "Research, Operations, M ate country-level teams to ensure narrative consistency and track campaign impact.", "ex": "Junior (1-4 years experience)", "rt": "Outreach", "po": "Full-time", "sa": "Not Found", "lg": "https://80000hours.org/wp-content/uploads/2022/08/AnimalEqualitySquareLogo.png", "oj": "https://animalequality.org/jobs/", "hi": false, "dp": "2026-03-13"}, {"id": 693, "t": "Communications Intern", "o": "Animal Outlook", "lk": "https://animaloutlook.org/intern/", "lo": "Remote, Global", "cl": "Rolling", "ar": "B. Animal welfare", "d": "\"Animal Outlook, a national nonprofit animal advocacy organization, seeks a communications intern to assist with social media, blog posts and email newsletters as well as creating associated collateral for each. You’ll work closely with the Director of Communications to create effective, engaging content. Responsibilities: Maintain a consistent voice across all Animal Outlook content in line with Animal Outlooks’ brand and style guide. Brainstorm and execute ideas for engaging blog posts, social media posts and other content. Create original Animal Outlook blog content covering general vegan or animal rights news, investigations, campaign launches and victories, legal work, and outreach announcements or recaps. Ensure optimal SEO and readability. Other duties as necessary.\"", "ex": "Entry-level", "rt": "Outreach", "po": "Internship", "sa": "Unpaid", "lg": "https://80000hours.org/wp-content/uploads/2022/02/animal-outlook.jpeg", "oj": "https://animaloutlook.org/jobs/", "hi": false, "dp": "2022-02-25"}, {"id": 694, "t": "Legal Advocacy Intern", "o": "Animal Outlook", "lk": "https://animaloutlook.org/intern/", "lo": "USA", "cl": "Rolling", "ar": "B. Animal welfare", "d": "* In this role, you'll work on legal projects aimed at protecting farmed animals through Animal Outlook's Legal Advocacy Internship.\n* Research and assist with litigation involving animal protection laws, administrative law, false advertising, and corporate law.\n* Collaborate closely with Animal Outlook's attorneys on both new and ongoing legal projects.\n* Develop novel approaches to using the law for animal protection.\n* Apply your legal research and writing skills to create meaningful change for animals in agriculture.", "ex": "Entry-level", "rt": "Legal", "po": "Internship", "sa": "Not Found", "lg": "https://80000hours.org/wp-content/uploads/2022/02/animal-outlook.jpeg", "oj": "https://animaloutlook.org/jobs/", "hi": false, "dp": "2025-07-31"}, {"id": 695, "t": "Monitoring and Evaluation Coordinator", "o": "Ansh", "lk": "https://www.ansh.health/monitoring-and-evaluation-coordinator", "lo": "Banswara, India · Pratapgarh, India", "cl": "Rolling", "ar": "A. Global health & development", "d": "'- Ansh is seeking a dedicated and experienced professional to join our team as a Monitoring and Evaluation (M&E) Coordinator.\n- Collect and manage data from various sources, including Dimagi, hospital records, and program coordinators.\n- Oversee and report on all program activities, including identification of low birth weight babies and counselling in neonatal care.\n- Analyse program data to identify trends, patterns, and areas for improvement.\n- Conduct random checks to verify data reported by nurses and address inconsistencies and errors.", "ex": "Junior (1-4 years experience)", "rt": "Operations", "po": "Full-time", "sa": "600,000 INR", "lg": "https://80000hours.org/wp-content/uploads/2024/05/ansh_logo.jpeg", "oj": "https://www.ansh.health/careers", "hi": false, "dp": "2024-09-16"}, {"id": 696, "t": "Research Engineer, ML Safety", "o": "Apple", "lk": "https://jobs.apple.com/en-gb/details/200640076-3577/ml-safety-engineer?team=SFTWR", "lo": "San Francisco Bay Area, USA", "cl": "Rolling", "ar": "D. Career development: Technical", "d": "* In this role, you'll lead the design and development of automated safety benchmarking for AI models at Apple.\n* Design scientifically-grounded evaluation frameworks to assess safety across media applications.\n* al media, contributing to the goal of informing the public.\n- Write engaging and informative articles, blog posts, and social media updates, and potentially contribute to the newsletter.\n- Create and source visual content like images, infographics, and videos to integrate into articles.\n- Develop and manage the content calendar and plan publications.\n- Collaborate with the team to develop and refine a communication strategy.\n- Requires fluency in Dutch.", "ex": "Junior (1-4 years experience)", "rt": "Other", "po": "Part-time", "sa": "Not Found", "lg": "https://80000hours.org/wp-content/uploads/2024/08/effectief_geven_logo.jpeg", "oj": "https://www.effectiefgeven.be/vacatures", "hi": false, "dp": "2025-03-05"}, {"id": 713, "t": "Social Media Manager", "o": "Effectief Geven", "lk": "https://www.effectiefgeven.be/vacatures/social-media-manager", "lo": "Ghent, Belgium", "cl": "Rolling", "ar": "5. Building effective altruism", "d": "* In this role, you'll manage social media to amplify the organisation's mission to target audiences through strategic positioning and content.\n* Develop and execute a clear content strategy across LinkedIn, Instagram and other relevant social channels.\n* Create compelling posts that translate complex impact insights into accessible formats and visuals.\n* Plan and coordinate campaigns around press moments, events and reports.\n* Analyse performance data and engage with the community to optimise reach and impact.", "ex": "Entry-level", "rt": "Outreach", "po": "Part-time", "sa": "Not Found", "lg": "https://80000hours.org/wp-content/uploads/2024/08/effectief_geven_logo.jpeg", "oj": "https://www.effectiefgeven.be/vacatures", "hi": false, "dp": "2026-02-23"}, {"id": 714, "t": "Head of Community", "o": "Effective Altruism DC", "lk": "https://docs.google.com/document/d/1SmRwx9H1pBgS4Tr2Rjb88NdSit14wQSFS9QEbrqFlGc/edit?tab=t.0", "lo": "Washington · DC metro area, USA", "cl": "Rolling", "ar": "5. Building effective altruism", "d": "* In this r
